<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área Admin — ELOI Design Studio</title>
  <link rel="stylesheet" href="https://use.typekit.net/ngx4uek.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--c950:#10002B;--c900:#240046;--c800:#3C096C;--c700:#5A189A;--c600:#7B2CBF;--c500:#9D4EDD;--c300:#C77DFF;--c100:#E0AAFF;--white:#fff;--font:'carbona-variable',sans-serif}
    body{font-family:var(--font);background:var(--c950);color:var(--white);min-height:100vh;line-height:1.6;display:flex;align-items:center;justify-content:center;padding:24px}
    .aurora{position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(80px) saturate(140%);opacity:.5}
    .blob{position:absolute;border-radius:50%;mix-blend-mode:screen}
    .blob.b1{width:40%;height:45%;left:5%;top:2%;background:radial-gradient(circle,#9D4EDD,transparent 70%);animation:d1 20s ease-in-out infinite}
    .blob.b2{width:44%;height:50%;right:3%;top:-8%;background:radial-gradient(circle,#7B2CBF,transparent 70%);animation:d2 24s ease-in-out infinite}
    @keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(24%,16%) scale(1.2)}}
    @keyframes d2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20%,18%) scale(1.15)}}
    .box{position:relative;z-index:1;width:100%;max-width:560px}
    .logo{width:160px;display:block;margin:0 auto 32px}
    .card-base{background:rgba(36,0,70,.6);border:1px solid var(--c800);border-radius:20px;backdrop-filter:blur(8px)}

    /* login */
    .login{padding:44px 40px;text-align:center;max-width:380px;margin:0 auto}
    .login h1{font-size:1.2rem;font-variation-settings:'wght' 600;margin-bottom:20px}
    .login input{width:100%;background:var(--c950);border:1px solid var(--c800);border-radius:10px;color:#fff;font-family:var(--font);font-size:.95rem;padding:13px 16px;outline:none;transition:border-color .2s,box-shadow .2s}
    .login input:focus{border-color:var(--c500);box-shadow:0 0 0 3px rgba(157,78,221,.2)}
    .login button{width:100%;margin-top:14px;background:var(--c700);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:.95rem;font-variation-settings:'wght' 600;padding:14px;cursor:pointer;transition:background .2s}
    .login button:hover{background:var(--c600)}
    .err{color:#f87171;font-size:.85rem;margin-top:12px;min-height:1.2em}

    /* hub */
    .hub{display:none}
    .hub.show{display:block}
    .hub h1{font-size:1.5rem;font-variation-settings:'wght' 700;text-align:center;margin-bottom:8px;letter-spacing:-.02em}
    .hub .sub{text-align:center;color:var(--c300);font-size:.9rem;margin-bottom:28px}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:520px){.cards{grid-template-columns:1fr}}
    .nav-card{display:block;text-decoration:none;color:#fff;padding:30px 26px;transition:border-color .2s,transform .15s,background .2s;cursor:pointer}
    .nav-card:hover{border-color:var(--c500);transform:translateY(-3px);background:rgba(45,0,85,.7)}
    .nav-card .ic{font-size:2rem;margin-bottom:14px;display:block}
    .nav-card .t{font-size:1.1rem;font-variation-settings:'wght' 600;margin-bottom:4px}
    .nav-card .d{font-size:.82rem;color:var(--c300)}
    .logout{display:block;margin:24px auto 0;background:transparent;border:1px solid var(--c800);color:var(--c300);font-family:var(--font);font-size:.82rem;padding:9px 20px;border-radius:8px;cursor:pointer;transition:border-color .2s}
    .logout:hover{border-color:var(--c500)}
  </style>
</head>
<body>
<div class="aurora"><span class="blob b1"></span><span class="blob b2"></span></div>

<div class="box">
  <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750.94 177.34" aria-label="ELOI"><path fill="#fff" d="M29.56,169.41c-9.77-5.29-17.14-12.61-22.11-21.99-4.97-9.37-7.45-20.22-7.45-32.56s2.52-24.03,7.57-33.64c5.05-9.61,12.41-17.02,22.11-22.23,9.69-5.2,21.42-7.81,35.2-7.81s25.11,2.49,34.48,7.45c9.37,4.97,16.5,12.01,21.39,21.15,4.88,9.13,7.41,19.94,7.57,32.44v5.77c0,.96-.08,1.92-.24,2.88H15.86l.48-19.46h87.47l-11.29,12.02c.64-8.65.04-15.86-1.8-21.63-1.84-5.77-4.97-10.13-9.37-13.1-4.41-2.96-10.06-4.45-16.94-4.45-7.53,0-13.58,1.8-18.14,5.41-4.57,3.6-7.81,8.29-9.73,14.06s-2.88,12.34-2.88,19.7c0,8.33,1.24,15.42,3.72,21.27,2.48,5.85,6.17,10.25,11.05,13.22,4.88,2.97,10.85,4.45,17.9,4.45,7.53,0,13.61-1.4,18.26-4.2,4.64-2.8,7.69-6.37,9.13-10.69h33.16c-2.88,12.98-9.65,22.87-20.3,29.68-10.66,6.81-24.47,10.21-41.45,10.21-13.94,0-25.79-2.64-35.56-7.93Z"/><path fill="#fff" d="M192.12,170.01c-6.97-3.44-12.1-8.97-15.38-16.58-3.29-7.61-4.93-17.66-4.93-30.16V34.36h-43.49V6.97h54.79c5.44,0,9.73.72,12.86,2.16,3.12,1.44,5.41,3.72,6.85,6.85s2.16,7.41,2.16,12.86v96.6c0,5.29.56,9.53,1.68,12.74,1.12,3.21,3.12,5.61,6.01,7.21,2.88,1.6,6.89,2.4,12.01,2.4h31.24v27.39h-37.25c-10.73,0-19.58-1.72-26.55-5.17Z"/><path fill="#fff" d="M300.97,169.29c-9.53-5.37-16.7-12.77-21.51-22.23-4.81-9.45-7.21-20.5-7.21-33.16s2.4-23.23,7.21-32.68c4.81-9.45,12.02-16.82,21.63-22.11,9.61-5.29,21.3-7.93,35.08-7.93s25.43,2.64,34.96,7.93c9.53,5.29,16.74,12.66,21.63,22.11,4.88,9.45,7.33,20.35,7.33,32.68s-2.44,23.71-7.33,33.16c-4.89,9.45-12.1,16.86-21.63,22.23-9.53,5.37-21.19,8.05-34.96,8.05s-25.67-2.68-35.2-8.05ZM358.88,140.46c5.05-6.17,7.57-15.02,7.57-26.55,0-7.37-1.12-13.66-3.36-18.86-2.25-5.2-5.61-9.21-10.09-12.01-4.49-2.8-10.17-4.21-17.06-4.21-9.93,0-17.42,3.05-22.47,9.13-5.04,6.09-7.57,14.74-7.57,25.95,0,7.69,1.12,14.18,3.36,19.46,2.24,5.29,5.6,9.33,10.09,12.13,4.48,2.81,10.01,4.21,16.58,4.21,10.25,0,17.9-3.08,22.95-9.25Z"/><path fill="#fff" d="M415.71,147.78h48.3v-67.04h-43.01v-27.39h54.31c5.61,0,9.97.68,13.1,2.04,3.12,1.36,5.37,3.6,6.73,6.73,1.36,3.12,2.04,7.49,2.04,13.1v72.57h43.97v27.39h-125.44v-27.39ZM462.81,31.6c-3.69-3.12-5.53-7.73-5.53-13.82s1.8-10.57,5.41-13.46c3.61-2.88,9.01-4.33,16.22-4.33s12.57,1.44,16.1,4.33c3.52,2.88,5.29,7.37,5.29,13.46s-1.77,10.69-5.29,13.82c-3.53,3.12-8.89,4.69-16.1,4.69s-12.42-1.56-16.1-4.69Z"/></svg>

  <!-- LOGIN -->
  <div class="card-base login" id="loginView">
    <h1>Área Administrativa</h1>
    <input type="password" id="pw" placeholder="Senha de acesso" autocomplete="current-password">
    <button onclick="entrar()">Entrar</button>
    <div class="err" id="err"></div>
  </div>

  <!-- HUB -->
  <div class="hub" id="hubView">
    <h1>Painel ELOI</h1>
    <p class="sub">Selecione o que deseja gerenciar</p>
    <div class="cards">
      <a class="card-base nav-card" href="/painel/">
        <span class="ic">📋</span>
        <div class="t">Briefings</div>
        <div class="d">Briefings recebidos dos clientes, cores e pendências.</div>
      </a>
      <a class="card-base nav-card" href="/painel-orcamentos/">
        <span class="ic">💰</span>
        <div class="t">Orçamentos</div>
        <div class="d">Criar, editar e acompanhar orçamentos e propostas.</div>
      </a>
    </div>
    <button class="logout" onclick="sair()">Sair</button>
  </div>
</div>

<script>
const FN = 'https://nlamznxoocmygfvnqcns.supabase.co/functions/v1/get-briefings';
function showHub(){ document.getElementById('loginView').style.display='none'; document.getElementById('hubView').classList.add('show'); }
function entrar(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err'); err.textContent='Verificando...';
  fetch(FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})})
    .then(r=> r.ok ? r.json() : Promise.reject(r.status))
    .then(()=>{ sessionStorage.setItem('eloi_pw', pw); showHub(); })
    .catch(s=>{ err.textContent = s===401 ? 'Senha incorreta.' : 'Erro. Tente de novo.'; });
}
function sair(){ sessionStorage.removeItem('eloi_pw'); location.reload(); }
document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); });
const saved = sessionStorage.getItem('eloi_pw');
if(saved){ document.getElementById('pw').value=saved; entrar(); }
</script>
</body>
</html>
