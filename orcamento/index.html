<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#F7F4FB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ELOI">
  <meta name="robots" content="noindex, nofollow">
  <title>Orçamento — ELOI Design Studio</title>
  <link rel="stylesheet" href="https://use.typekit.net/ngx4uek.css">
  <link rel="stylesheet" href="/assets/eloi-admin/admin.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--c950:#10002B;--c900:#240046;--c800:#3C096C;--c700:#5A189A;--c600:#7B2CBF;--c500:#9D4EDD;--c300:#C77DFF;--c100:#E0AAFF;--white:#fff;--font:'carbona-variable',sans-serif}
    body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.65}
    .aurora{position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(90px);opacity:.28}
    .blob{position:absolute;border-radius:50%;}
    .blob.b1{width:40%;height:45%;left:5%;top:2%;background:radial-gradient(circle,#9D4EDD,transparent 70%);animation:d1 20s ease-in-out infinite}
    .blob.b2{width:44%;height:50%;right:3%;top:-8%;background:radial-gradient(circle,#7B2CBF,transparent 70%);animation:d2 24s ease-in-out infinite}
    .blob.b3{width:36%;height:44%;left:33%;bottom:0;background:radial-gradient(circle,#C77DFF,transparent 70%);animation:d3 17s ease-in-out infinite}
    @keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(24%,16%) scale(1.2)}}
    @keyframes d2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20%,18%) scale(1.15)}}
    @keyframes d3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(18%,-20%) scale(1.25)}}

    .doc{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 22px 70px}
    .topbar{text-align:left;padding:48px 0 8px}
    .logo{height:56px;width:auto;display:block}
    .eyebrow{text-align:center;font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-variation-settings:'wght' 600;margin:26px 0 10px}

    .card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:32px 34px;backdrop-filter:blur(8px)}
    .cli{font-size:.85rem;color:var(--muted);margin-bottom:4px}
    .card h1{font-size:clamp(1.4rem,4vw,2rem);font-variation-settings:'wght' 700;letter-spacing:-.02em;line-height:1.15;margin-bottom:22px}

    .itens{border-top:1px solid var(--line)}
    .item{display:flex;justify-content:space-between;gap:16px;padding:15px 2px;border-bottom:1px solid var(--line);font-size:.96rem}
    .item .nm{color:var(--ink)}
    .item .vl{color:var(--ink-2);font-variation-settings:'wght' 600;white-space:nowrap}
    .item.neg .vl{color:#86efac}
    .empty{padding:18px 2px;color:var(--muted)}

    .total{display:flex;justify-content:space-between;align-items:baseline;margin-top:22px;padding-top:18px;border-top:2px solid var(--c700)}
    .total span{font-size:.95rem;color:var(--muted)}
    .total strong{font-size:1.7rem;color:var(--ink);font-variation-settings:'wght' 700}

    .meta{font-size:.78rem;color:var(--muted);opacity:.8;margin-top:18px}
    .note{background:rgba(157,78,221,.12);border:1px solid rgba(157,78,221,.3);border-radius:12px;padding:14px 18px;font-size:.86rem;color:var(--ink-2);margin-top:22px}

    .foot{text-align:center;color:var(--muted);font-size:.82rem;opacity:.75;padding-top:30px;line-height:1.8}
    .foot a{color:var(--ink-2);text-decoration:none}

    .acoes{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
    .acoes button{flex:1;min-width:160px;border:none;border-radius:12px;font-family:var(--font);font-size:.92rem;font-variation-settings:'wght' 600;padding:14px 20px;cursor:pointer;transition:transform .15s,background .2s}
    .acoes button:disabled{opacity:.5;cursor:default}
    .acoes button.btn-ok{background:var(--c700);color:#fff}
    .acoes button.btn-ok:hover:not(:disabled){background:var(--c600);transform:translateY(-1px)}
    .acoes button.btn-no{background:transparent;border:1px solid rgba(248,113,113,.4);color:var(--bad)}
    .acoes button.btn-no:hover:not(:disabled){background:rgba(248,113,113,.12)}
    .note.ok{background:var(--good-soft);border-color:rgba(74,222,128,.3);color:var(--good)}

    .state{text-align:center;padding:90px 20px;color:var(--muted);position:relative;z-index:1}
    .state .ic{font-size:2.6rem;opacity:.5;margin-bottom:14px}
    @media(max-width:560px){.card{padding:26px 22px}}
  </style>
</head>
<body>
<div class="aurora"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

<div id="root">
  <div class="state" id="loading">Carregando orçamento…</div>
</div>

<script src="/assets/eloi-admin/orcamento.js"></script>
<script>
const FN = 'https://nlamznxoocmygfvnqcns.supabase.co/functions/v1/orcamentos';
const LOGO = `<img class="logo" src="/assets/eloi-admin/wordmark.svg" alt="ELOI Design Studio">`;

function brl(n){ return 'R$ ' + (Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function showState(ic, msg){
  document.getElementById('root').innerHTML = `<div class="state"><div class="ic">${ic}</div>${esc(msg)}</div>`;
}

let CUR_TOKEN = null;

function render(o){
  const itens = Array.isArray(o.itens) ? o.itens : [];
  const linhas = itens.length
    ? itens.map(it=>{
        const v = Number(it.valor)||0;
        return `<div class="item ${v<0?'neg':''}"><span class="nm">${esc(it.nome||'—')}</span><span class="vl">${v<0?'− ':''}${brl(Math.abs(v))}</span></div>`;
      }).join('')
    : '<div class="empty">Sem itens.</div>';
  const _r = window.EloiOrcamento.calcular({itens, complexidade:o.complexidade, urgencia:o.urgencia, desconto_pct:o.desconto_pct});
  const ajustesHtml = _r.ajustes.length
    ? `<div class="item"><span class="nm">Subtotal</span><span class="vl">${brl(_r.base)}</span></div>` +
      _r.ajustes.map(a=>`<div class="item ${a.valor<0?'neg':''}"><span class="nm">${esc(a.nome)}</span><span class="vl">${a.valor<0?'− ':'+ '}${brl(Math.abs(a.valor))}</span></div>`).join('')
    : '';
  const dt =o.created_at ? new Date(o.created_at).toLocaleDateString('pt-BR') : '';
  const status = o.status || 'rascunho';
  const rodape = status === 'enviado'
    ? `<div class="acoes"><button class="btn-ok" onclick="decidir('aprovado')">Aprovar orçamento</button><button class="btn-no" onclick="decidir('recusado')">Recusar</button></div>`
    : status === 'aprovado' ? `<div class="note ok">✓ Orçamento aprovado. Em breve entramos em contato pra dar início.</div>`
    : status === 'recusado' ? `<div class="note">Orçamento marcado como recusado. Qualquer dúvida, é só responder por aqui.</div>`
    : `<div class="note">Proposta válida por 15 dias. Para aprovar ou tirar dúvidas, é só responder por aqui.</div>`;
  document.getElementById('root').innerHTML = `
    <div class="doc">
      <div class="topbar">${LOGO}</div>
      <div class="eyebrow">Proposta de Orçamento</div>
      <div class="card">
        ${o.cliente?`<div class="cli">${esc(o.cliente)}</div>`:''}
        <h1>${esc(o.titulo||'Orçamento')}</h1>
        <div class="itens">${linhas}${ajustesHtml}</div>
        <div class="total"><span>Total</span><strong>${brl(o.valor_total)}</strong></div>
        ${dt?`<div class="meta">Emitido em ${dt}</div>`:''}
        ${rodape}
      </div>
      <div class="foot">ELOI Design Studio<br><a href="mailto:contato@eloidesign.com.br">contato@eloidesign.com.br</a> · eloidesign.com.br</div>
    </div>`;
}

async function decidir(decisao){
  const btns = document.querySelectorAll('.acoes button');
  btns.forEach(b=>b.disabled=true);
  try{
    const r = await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'client_decide',token:CUR_TOKEN,decisao})});
    const d = await r.json();
    if(!r.ok || d.error) throw new Error(d.error||'erro');
    carregar();
  }catch(e){
    btns.forEach(b=>b.disabled=false);
    alert('Não deu pra registrar sua resposta agora. Tenta de novo em instantes.');
  }
}

function carregar(){
  const params = new URLSearchParams(location.search);
  const token = params.get('t');
  CUR_TOKEN = token;
  if(!token){ showState('🔗','Link inválido.'); return; }
  fetch(FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'public_get',token})})
    .then(r=> r.ok ? r.json() : Promise.reject(r.status))
    .then(d=>{ if(d&&d.orcamento) render(d.orcamento); else showState('🔍','Orçamento não encontrado.'); })
    .catch(s=>{ showState(s===404?'🔍':'⚠️', s===404?'Orçamento não encontrado ou link expirado.':'Não foi possível carregar o orçamento.'); });
}
carregar();
</script>
</body>
</html>
