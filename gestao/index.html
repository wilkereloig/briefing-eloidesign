<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão — ELOI Design Studio</title>
  <link rel="stylesheet" href="https://use.typekit.net/ngx4uek.css">
  <link rel="stylesheet" href="/assets/eloi-admin/admin.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--c950:#10002B;--c900:#240046;--c800:#3C096C;--c700:#5A189A;--c600:#7B2CBF;--c500:#9D4EDD;--c300:#C77DFF;--c100:#E0AAFF;--white:#fff;--font:'carbona-variable',sans-serif;--good:#aee8ae;--warn:#E0AAFF}
    body{font-family:var(--font);background:var(--c950);color:var(--white);min-height:100vh;line-height:1.6}
    a{color:var(--c300)}
    .aurora{position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(80px) saturate(140%);opacity:.4}
    .blob{position:absolute;border-radius:50%;mix-blend-mode:screen}
    .blob.b1{width:40%;height:45%;left:5%;top:2%;background:radial-gradient(circle,#9D4EDD,transparent 70%);animation:d1 20s ease-in-out infinite}
    .blob.b2{width:44%;height:50%;right:3%;top:-8%;background:radial-gradient(circle,#7B2CBF,transparent 70%);animation:d2 24s ease-in-out infinite}
    @keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(24%,16%) scale(1.2)}}
    @keyframes d2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20%,18%) scale(1.15)}}

    /* login */
    .login{position:relative;z-index:1;max-width:380px;margin:12vh auto 0;background:rgba(36,0,70,.6);border:1px solid var(--c800);border-radius:20px;padding:44px 40px;text-align:center;backdrop-filter:blur(8px)}
    .login .logo{width:150px;margin:0 auto 26px;display:block}
    .login h1{font-size:1.15rem;font-variation-settings:'wght' 600;margin-bottom:20px}
    .login input{width:100%;background:var(--c950);border:1px solid var(--c800);border-radius:10px;color:#fff;font-family:var(--font);font-size:.95rem;padding:13px 16px;outline:none}
    .login input:focus{border-color:var(--c500);box-shadow:0 0 0 3px rgba(157,78,221,.2)}
    .login button{width:100%;margin-top:14px;background:var(--c700);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:.95rem;font-variation-settings:'wght' 600;padding:14px;cursor:pointer}
    .login button:hover{background:var(--c600)}
    .err{color:#f87171;font-size:.85rem;margin-top:12px;min-height:1.2em}

    /* app */
    #app{display:none;position:relative;z-index:1;max-width:1040px;margin:0 auto;padding:28px 22px 80px}
    #app.show{display:block}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .topbar .logo{width:128px;display:block}
    .topbar .right{display:flex;gap:10px}
    .btn{background:var(--c700);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:.88rem;font-variation-settings:'wght' 600;padding:10px 18px;cursor:pointer;transition:background .2s,transform .15s}
    .btn:hover{background:var(--c600);transform:translateY(-1px)}
    .btn-ghost{background:transparent;border:1px solid var(--c800);color:var(--c300);text-decoration:none;display:inline-flex;align-items:center}
    .btn-ghost:hover{border-color:var(--c500);color:#fff}
    .btn-sm{padding:6px 12px;font-size:.78rem}

    /* dashboard */
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
    .stat{background:rgba(36,0,70,.5);border:1px solid var(--c800);border-radius:14px;padding:15px 18px}
    .stat .sv{font-size:1.5rem;font-variation-settings:'wght' 700;line-height:1.1}
    .stat .sl{font-size:.76rem;color:var(--c300);margin-top:3px}
    .stat.good .sv{color:var(--good)}
    .stat.warn .sv{color:var(--warn)}
    .rankwrap{background:rgba(36,0,70,.5);border:1px solid var(--c800);border-radius:14px;padding:12px 18px;margin-bottom:24px}
    .rankwrap h3{font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;color:var(--c300);margin-bottom:8px;font-variation-settings:'wght' 600}
    .rank-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:.88rem}
    .rank-row .rv{margin-left:auto;color:var(--c100);font-variation-settings:'wght' 600}

    /* tabs */
    .tabs{display:flex;gap:8px;margin-bottom:18px;border-bottom:1px solid var(--c800)}
    .tab{background:none;border:none;color:var(--c300);font-family:var(--font);font-size:.92rem;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
    .tab.active{color:#fff;border-bottom-color:var(--c500);font-variation-settings:'wght' 600}

    /* chips */
    .chip{display:inline-block;color:#fff;font-size:.74rem;font-variation-settings:'wght' 600;border-radius:99px;padding:3px 12px;white-space:nowrap}

    /* filtros */
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:end}
    .filters select,.filters input{background:var(--c950);border:1px solid var(--c800);border-radius:8px;color:#fff;font-family:var(--font);font-size:.82rem;padding:8px 11px;outline:none}
    .filters label{font-size:.7rem;color:var(--c300);display:block;margin-bottom:3px}

    /* serviços agrupados */
    .grupo{margin-bottom:20px}
    .grupo-h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .grupo-h .gtot{margin-left:auto;font-size:.8rem;color:var(--c300)}
    .svc{background:rgba(36,0,70,.45);border:1px solid var(--c800);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:7px;cursor:pointer;transition:border-color .2s,background .2s}
    .svc:hover{border-color:var(--c500);background:rgba(45,0,85,.6)}
    .svc .desc{flex:1;min-width:0}
    .svc .desc .d{font-size:.92rem;overflow:hidden;text-overflow:ellipsis}
    .svc .desc .m{font-size:.72rem;color:var(--c300);margin-top:2px}
    .svc .valor{font-variation-settings:'wght' 700;font-size:.95rem;white-space:nowrap}
    .badge{font-size:.68rem;border-radius:99px;padding:2px 9px;white-space:nowrap;border:1px solid}
    .badge.aguard{background:rgba(96,165,250,.14);border-color:#4a6d9a;color:#a8c8f0}
    .badge.exec{background:rgba(224,170,255,.12);border-color:var(--c600);color:var(--c100)}
    .badge.concl{background:rgba(56,142,60,.16);border-color:#4a7d4f;color:var(--good)}
    .badge.pago{background:rgba(56,142,60,.16);border-color:#4a7d4f;color:var(--good)}
    .badge.naopago{background:rgba(248,113,113,.12);border-color:#9a4a4a;color:#f3b4b4}
    .nf-pill{font-size:.7rem;color:var(--c100);border:1px solid var(--c700);border-radius:6px;padding:2px 8px;background:transparent;cursor:pointer;font-family:var(--font)}
    .nf-pill:hover{border-color:var(--c500)}

    /* clientes */
    .cli-row{background:rgba(36,0,70,.45);border:1px solid var(--c800);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .cli-row .cmeta{margin-left:auto;font-size:.78rem;color:var(--c300);text-align:right}

    .empty{text-align:center;color:var(--c300);padding:36px 20px;opacity:.7}

    /* modal */
    .modal-bg{display:none;position:fixed;inset:0;z-index:10;background:rgba(8,0,20,.7);backdrop-filter:blur(3px);align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
    .modal-bg.show{display:flex}
    .modal{background:var(--c900);border:1px solid var(--c700);border-radius:16px;padding:24px;width:100%;max-width:460px}
    .modal h2{font-size:1.05rem;font-variation-settings:'wght' 700;margin-bottom:16px}
    .fld{margin-bottom:12px}
    .fld label{display:block;font-size:.76rem;color:var(--c300);margin-bottom:5px}
    .fld input,.fld select,.fld textarea{width:100%;background:var(--c950);border:1px solid var(--c800);border-radius:8px;color:#fff;font-family:var(--font);font-size:.9rem;padding:10px 13px;outline:none}
    .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--c500);box-shadow:0 0 0 3px rgba(157,78,221,.18)}
    .fld textarea{resize:vertical;min-height:54px}
    .frow{display:flex;gap:10px}
    .frow .fld{flex:1}
    .chk{display:flex;align-items:center;gap:8px;font-size:.88rem;color:var(--c100)}
    .chk input{width:auto}
    .modal-actions{display:flex;gap:10px;justify-content:space-between;margin-top:18px}
    .modal-actions .btn-del{background:transparent;border:1px solid #9a4a4a;color:#f3b4b4}
    .modal-actions .btn-del:hover{background:rgba(154,74,74,.2)}
    .modal-err{color:#f87171;font-size:.82rem;min-height:1.1em;margin-top:6px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--c700);color:#fff;padding:12px 22px;border-radius:10px;font-size:.88rem;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="aurora"><span class="blob b1"></span><span class="blob b2"></span></div>

<!-- LOGIN -->
<div class="login" id="loginView">
  <div class="logo" id="logoSlotLogin"></div>
  <h1>Gestão</h1>
  <input type="password" id="pw" placeholder="Senha de acesso" autocomplete="current-password">
  <button onclick="entrar()">Entrar</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="logo" id="logoSlotApp"></div>
    <div class="right">
      <a class="btn btn-ghost btn-sm" href="/admin/">← Admin</a>
      <button class="btn btn-ghost btn-sm" onclick="sair()">Sair</button>
    </div>
  </div>

  <!-- dashboard -->
  <div class="metrics" id="metrics"></div>
  <div class="rankwrap" id="rankwrap" style="display:none">
    <h3>Faturamento por cliente</h3>
    <div id="rank"></div>
  </div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="servicos" onclick="trocarTab('servicos')">Serviços</button>
    <button class="tab" data-tab="clientes" onclick="trocarTab('clientes')">Clientes</button>
  </div>

  <!-- aba serviços -->
  <div id="tabServicos">
    <div class="filters">
      <div><label>Cliente</label><select id="fCliente" onchange="carregarServicos()"><option value="">Todos</option></select></div>
      <div><label>Status</label><select id="fStatus" onchange="carregarServicos()"><option value="">Todos</option><option value="aguardando_inicio">Aguardando início</option><option value="em_execucao">Em execução</option><option value="concluida">Concluída</option></select></div>
      <div><label>Pagamento</label><select id="fPago" onchange="carregarServicos()"><option value="">Todos</option><option value="true">Pago</option><option value="false">A receber</option></select></div>
      <div><label>Mês (pgto)</label><input type="month" id="fMes" onchange="carregarServicos()"></div>
      <div style="margin-left:auto"><button class="btn" onclick="abrirServico()">+ Serviço</button></div>
    </div>
    <div id="servicosList"></div>
  </div>

  <!-- aba clientes -->
  <div id="tabClientes" style="display:none">
    <div class="filters"><div style="margin-left:auto"><button class="btn" onclick="abrirCliente()">+ Cliente</button></div></div>
    <div id="clientesList"></div>
  </div>
</div>

<!-- MODAL SERVIÇO -->
<div class="modal-bg" id="modalServico">
  <div class="modal">
    <h2 id="svcTitle">Novo serviço</h2>
    <input type="hidden" id="svcId">
    <div class="fld"><label>Cliente</label><select id="svcCliente"></select></div>
    <div class="fld"><label>Serviço (descrição)</label><textarea id="svcDesc" placeholder="Ex: Layout jogo ROG (versão vertical)"></textarea></div>
    <div class="frow">
      <div class="fld"><label>Valor (R$)</label><input type="text" id="svcValor" inputmode="decimal" placeholder="1.000,00"></div>
      <div class="fld"><label>Status</label><select id="svcStatus"><option value="aguardando_inicio">Aguardando início</option><option value="em_execucao">Em execução</option><option value="concluida">Concluída</option></select></div>
    </div>
    <div class="frow">
      <div class="fld"><label>Nº Nota (NF-S)</label><input type="text" id="svcNf" placeholder="ex: 23"></div>
      <div class="fld"><label>Data pagamento</label><input type="date" id="svcData"></div>
    </div>
    <div class="fld"><label class="chk"><input type="checkbox" id="svcPago"> Pago</label></div>
    <div class="fld"><label>Observações</label><textarea id="svcObs" placeholder="ex: pago parcial / precisa emitir nota"></textarea></div>
    <div class="fld"><label>PDF da nota fiscal</label><input type="file" id="svcPdf" accept="application/pdf"><div id="svcNfAtual" style="font-size:.76rem;margin-top:6px"></div></div>
    <div class="modal-err" id="svcErr"></div>
    <div class="modal-actions">
      <button class="btn btn-del" id="svcDelBtn" onclick="excluirServico()" style="display:none">Excluir</button>
      <div style="display:flex;gap:10px;margin-left:auto">
        <button class="btn btn-ghost" onclick="fecharModal('modalServico')">Cancelar</button>
        <button class="btn" id="svcSaveBtn" onclick="salvarServico()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-bg" id="modalCliente">
  <div class="modal">
    <h2 id="cliTitle">Novo cliente</h2>
    <input type="hidden" id="cliId">
    <div class="frow">
      <div class="fld" style="flex:2"><label>Nome / empresa</label><input type="text" id="cliNome" placeholder="ex: ASUS"></div>
      <div class="fld" style="flex:0 0 70px"><label>Cor</label><input type="color" id="cliCor" value="#7B2CBF" style="height:42px;padding:4px"></div>
    </div>
    <div class="fld"><label>Contato (opcional)</label><input type="text" id="cliContato" placeholder="responsável / whatsapp / email"></div>
    <div class="frow">
      <div class="fld" style="flex:2"><label>Entrega de marca (slug, opcional)</label><input type="text" id="cliMarcaSlug" placeholder="ex: georgia-andrade"></div>
      <div class="fld" style="flex:0 0 140px"><label>Publicada</label><label style="display:flex;align-items:center;gap:6px;height:42px"><input type="checkbox" id="cliMarcaPublicada"> pública</label></div>
    </div>
    <div class="modal-err" id="cliErr"></div>
    <div class="modal-actions">
      <button class="btn btn-del" id="cliDelBtn" onclick="excluirCliente()" style="display:none">Excluir</button>
      <div style="display:flex;gap:10px;margin-left:auto">
        <button class="btn btn-ghost" onclick="fecharModal('modalCliente')">Cancelar</button>
        <button class="btn" id="cliSaveBtn" onclick="salvarCliente()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ENTREGAS (arquivos/apresentação/fontes do cliente) -->
<div class="modal-bg" id="modalEntregas">
  <div class="modal">
    <h2>Arquivos — <span id="entCliNome"></span></h2>
    <input type="hidden" id="entCliId">
    <div class="frow">
      <div class="fld"><label>Categoria</label><select id="entCategoria"><option value="arquivo">Arquivo do projeto</option><option value="apresentacao">Apresentação</option><option value="fonte">Fonte</option></select></div>
      <div class="fld"><label>Arquivo</label><input type="file" id="entArquivo"></div>
    </div>
    <button class="btn btn-sm" onclick="enviarEntrega()">+ Enviar</button>
    <div id="entLista" style="margin-top:14px"></div>
    <div class="modal-actions"><div style="display:flex;gap:10px;margin-left:auto"><button class="btn btn-ghost" onclick="fecharModal('modalEntregas')">Fechar</button></div></div>
  </div>
</div>

<!-- MODAL SENHA PORTAL -->
<div class="modal-bg" id="modalSenha">
  <div class="modal">
    <h2>Senha do portal</h2>
    <p style="font-size:.82rem;color:var(--c300);margin-bottom:12px">Envie por WhatsApp agora. Fechando esta janela, a senha não aparece de novo em lugar nenhum — só o hash fica salvo.</p>
    <div class="fld"><label>Link do portal</label><input type="text" id="senhaPortalLink" readonly></div>
    <div class="fld"><label>Senha</label><input type="text" id="senhaPortalValor" readonly></div>
    <div class="modal-actions">
      <div style="display:flex;gap:10px;margin-left:auto">
        <button class="btn btn-ghost" onclick="fecharModal('modalSenha')">Fechar</button>
        <button class="btn" onclick="copiarSenhaPortal()">Copiar link + senha</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/assets/eloi-admin/auth.js"></script>
<script>
fetch('/assets/eloi-admin/wordmark.svg').then(r=>r.text()).then(svg=>{
  document.getElementById('logoSlotLogin').innerHTML = svg;
  document.getElementById('logoSlotApp').innerHTML = svg;
});

const SUPA = "https://nlamznxoocmygfvnqcns.supabase.co/functions/v1/eloi-gestao";
let CLIENTES = [];

async function api(action, extra = {}) {
  const j = await EloiAdminAuth.call(SUPA, { action, ...extra });
  if (j.error) throw new Error(j.error);
  return j;
}
function brl(cents){ return (Number(cents||0)/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function dataBR(d){ if(!d) return ''; const [y,m,dd]=String(d).slice(0,10).split('-'); return `${dd}/${m}/${y}`; }
function valorToCents(v){ const n = parseFloat(String(v).replace(/\./g,'').replace(',','.').replace(/[^0-9.]/g,'')); return isNaN(n)?0:Math.round(n*100); }
function centsToInput(c){ return (Number(c||0)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

async function entrar(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('loginErr'); err.textContent='Verificando...';
  try {
    await EloiAdminAuth.login(pw);
    err.textContent='';
    await mostrarApp();
  } catch(e){ err.textContent = e.status === 401 ? 'Senha incorreta.' : 'Erro de conexão. Tente de novo.'; }
}
function sair(){ EloiAdminAuth.logout(); location.reload(); }

async function mostrarApp(){
  document.getElementById('loginView').style.display='none';
  document.getElementById('app').classList.add('show');
  await carregarTudo();
}
async function carregarTudo(){
  await carregarClientes();
  await Promise.all([ carregarDashboard(), carregarServicos() ]);
}

/* DASHBOARD */
async function carregarDashboard(){
  const s = await api('dashboard.stats');
  document.getElementById('metrics').innerHTML = `
    <div class="stat good"><div class="sv">${brl(s.faturado_mes)}</div><div class="sl">Faturado no mês</div></div>
    <div class="stat warn"><div class="sv">${brl(s.a_receber)}</div><div class="sl">A receber</div></div>
    <div class="stat"><div class="sv">${s.em_execucao}</div><div class="sl">Em execução</div></div>
    <div class="stat"><div class="sv">${s.concluido_sem_nf}</div><div class="sl">Concluído sem NF</div></div>
    ${s.aprovados_pendentes_count ? `<div class="stat warn"><div class="sv">${brl(s.aprovados_pendentes_cents/100)}</div><div class="sl">Orçamento aprovado sem serviço</div></div>` : ''}`;
  const rank = (s.por_cliente||[]).filter(c=>c.total_cents>0);
  const rw = document.getElementById('rankwrap');
  if(rank.length){ rw.style.display='block';
    document.getElementById('rank').innerHTML = rank.map(c=>`<div class="rank-row"><span class="chip" style="background:${esc(c.cor)}">${esc(c.nome)}</span><span class="rv">${brl(c.total_cents)}</span></div>`).join('');
  } else rw.style.display='none';
}

/* CLIENTES */
async function carregarClientes(){
  const { clientes } = await api('clientes.list');
  CLIENTES = clientes;
  // popula selects
  const opt = '<option value="">—</option>' + clientes.map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('');
  document.getElementById('svcCliente').innerHTML = opt;
  document.getElementById('fCliente').innerHTML = '<option value="">Todos</option>' + clientes.map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('');
  // lista
  const list = document.getElementById('clientesList');
  if(!clientes.length){ list.innerHTML = '<div class="empty">Nenhum cliente ainda. Clique em "+ Cliente".</div>'; return; }
  list.innerHTML = clientes.map(c=>`
    <div class="cli-row" onclick='abrirCliente(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <span class="chip" style="background:${esc(c.cor)}">${esc(c.nome)}</span>
      ${c.contato?`<span style="font-size:.8rem;color:var(--c300)">${esc(c.contato)}</span>`:''}
      ${c.marca_slug?`<button class="btn btn-ghost" style="font-size:.75rem;padding:4px 10px" onclick='event.stopPropagation();copiarLinkMarca(${JSON.stringify(c.marca_slug)})'>🔗 ${c.marca_publicada?'link marca':'link marca (rascunho)'}</button>`:''}
      <button class="btn btn-ghost" style="font-size:.75rem;padding:4px 10px" onclick='event.stopPropagation();gerarSenhaPortal(${JSON.stringify(c.id)})'>🔐 Gerar senha do portal</button>
      <button class="btn btn-ghost" style="font-size:.75rem;padding:4px 10px" onclick='event.stopPropagation();abrirEntregas(${JSON.stringify(c.id)},${JSON.stringify(c.nome)})'>📁 Arquivos</button>
      <span class="cmeta">${c.total_servicos} serviço(s)<br>${brl(c.total_cents)}</span>
    </div>`).join('');
}

/* SERVIÇOS */
async function carregarServicos(){
  const filtro = {};
  const fc=document.getElementById('fCliente').value; if(fc) filtro.cliente_id=fc;
  const fs=document.getElementById('fStatus').value; if(fs) filtro.status_execucao=fs;
  const fp=document.getElementById('fPago').value; if(fp) filtro.pago = fp==='true';
  const fm=document.getElementById('fMes').value; if(fm) filtro.mes=fm;
  const { servicos } = await api('servicos.list', { filtro });
  const list = document.getElementById('servicosList');
  if(!servicos.length){ list.innerHTML = '<div class="empty">Nenhum serviço. Clique em "+ Serviço".</div>'; return; }
  const byCli = {}; servicos.forEach(s=>(byCli[s.cliente_id]??=[]).push(s));
  const ordem = CLIENTES.filter(c=>byCli[c.id]);
  list.innerHTML = ordem.map(c=>{
    const itens = byCli[c.id];
    const tot = itens.reduce((a,s)=>a+(Number(s.valor_cents)||0),0);
    return `<div class="grupo">
      <div class="grupo-h"><span class="chip" style="background:${esc(c.cor)}">${esc(c.nome)}</span><span class="gtot">${itens.length} • ${brl(tot)}</span></div>
      ${itens.map(s=>linhaServico(s,c)).join('')}
    </div>`;
  }).join('');
}
function linhaServico(s,c){
  const stb = s.status_execucao==='concluida' ? '<span class="badge concl">Concluída</span>'
    : s.status_execucao==='aguardando_inicio' ? '<span class="badge aguard">Aguardando início</span>'
    : '<span class="badge exec">Em execução</span>';
  const pgb = s.pago ? '<span class="badge pago">Pago</span>' : '<span class="badge naopago">A receber</span>';
  const meta = [ s.nf_numero?('NF '+esc(s.nf_numero)):'', dataBR(s.data_pagamento), s.observacoes?esc(s.observacoes):'' ].filter(Boolean).join(' • ');
  const nfBtn = s.nf_arquivo_url ? `<button class="nf-pill" onclick="event.stopPropagation();verNF('${esc(s.nf_arquivo_url)}')">📄 NF</button>` : '';
  return `<div class="svc" onclick='abrirServico(${JSON.stringify(s).replace(/'/g,"&#39;")})'>
    <div class="desc"><div class="d">${esc(s.descricao)}</div>${meta?`<div class="m">${meta}</div>`:''}</div>
    ${stb}${pgb}${nfBtn}<div class="valor">${brl(s.valor_cents)}</div>
  </div>`;
}
async function verNF(path){ try{ const { url } = await api('nf.view_url',{ path }); window.open(url,'_blank'); }catch(e){ toast('Erro ao abrir NF'); } }

/* MODAL SERVIÇO */
let SVC_PREV_STATUS = null;
function abrirServico(s){
  const ev = s && s.target ? null : s; // ignora event
  const d = (ev && ev.id) ? ev : null;
  SVC_PREV_STATUS = d ? d.status_execucao : null;
  document.getElementById('svcErr').textContent='';
  document.getElementById('svcPdf').value='';
  document.getElementById('svcId').value = d?d.id:'';
  document.getElementById('svcCliente').value = d?d.cliente_id:(document.getElementById('fCliente').value||'');
  document.getElementById('svcDesc').value = d?d.descricao:'';
  document.getElementById('svcValor').value = d?centsToInput(d.valor_cents):'';
  document.getElementById('svcStatus').value = d?d.status_execucao:'em_execucao';
  document.getElementById('svcNf').value = d&&d.nf_numero?d.nf_numero:'';
  document.getElementById('svcData').value = d&&d.data_pagamento?String(d.data_pagamento).slice(0,10):'';
  document.getElementById('svcPago').checked = d?!!d.pago:false;
  document.getElementById('svcObs').value = d&&d.observacoes?d.observacoes:'';
  document.getElementById('svcTitle').textContent = d?'Editar serviço':'Novo serviço';
  document.getElementById('svcDelBtn').style.display = d?'block':'none';
  document.getElementById('svcNfAtual').innerHTML = (d&&d.nf_arquivo_url)?`<a href="#" onclick="event.preventDefault();verNF('${esc(d.nf_arquivo_url)}')">📄 Ver nota atual</a> — escolha outro PDF para substituir`:'';
  document.getElementById('modalServico').classList.add('show');
}
async function salvarServico(){
  const err=document.getElementById('svcErr'); err.textContent='';
  const id=document.getElementById('svcId').value;
  const servico = {
    cliente_id: document.getElementById('svcCliente').value,
    descricao: document.getElementById('svcDesc').value.trim(),
    valor_cents: valorToCents(document.getElementById('svcValor').value),
    status_execucao: document.getElementById('svcStatus').value,
    pago: document.getElementById('svcPago').checked,
    data_pagamento: document.getElementById('svcData').value || null,
    nf_numero: document.getElementById('svcNf').value.trim(),
    observacoes: document.getElementById('svcObs').value.trim(),
  };
  if(id) servico.id=id;
  if(!servico.cliente_id){ err.textContent='Escolha o cliente.'; return; }
  if(!servico.descricao){ err.textContent='Descreva o serviço.'; return; }
  const btn=document.getElementById('svcSaveBtn'); btn.disabled=true; btn.textContent='Salvando...';
  try {
    const { servico: saved } = await api('servicos.upsert', { servico });
    const file = document.getElementById('svcPdf').files[0];
    if(file){
      btn.textContent='Subindo NF...';
      const { path, signed_url } = await api('nf.upload_url', { servico_id: saved.id, filename: file.name });
      const put = await fetch(signed_url, { method:'PUT', headers:{'content-type':file.type||'application/pdf'}, body:file });
      if(!put.ok) throw new Error('Falha no upload do PDF');
      await api('servicos.upsert', { servico:{ ...saved, nf_arquivo_url:path } });
    }
    fecharModal('modalServico'); toast('Serviço salvo');
    if(servico.status_execucao==='concluida' && SVC_PREV_STATUS!=='concluida'){
      const cli = CLIENTES.find(c=>c.id===servico.cliente_id);
      if(cli && !cli.portal_senha_hash) await gerarSenhaPortal(servico.cliente_id, {auto:true});
    }
    await Promise.all([ carregarDashboard(), carregarServicos(), carregarClientes() ]);
  } catch(e){ err.textContent=e.message; }
  finally { btn.disabled=false; btn.textContent='Salvar'; }
}
async function excluirServico(){
  const id=document.getElementById('svcId').value; if(!id) return;
  if(!confirm('Excluir este serviço?')) return;
  try{ await api('servicos.delete',{ id }); fecharModal('modalServico'); toast('Serviço excluído');
    await Promise.all([ carregarDashboard(), carregarServicos(), carregarClientes() ]);
  }catch(e){ document.getElementById('svcErr').textContent=e.message; }
}

function copiarLinkMarca(slug){
  const url = `${location.origin}/entregas-marca/${slug}/`;
  navigator.clipboard.writeText(url).then(()=>toast('Link copiado: '+url)).catch(()=>toast(url));
}

async function gerarSenhaPortal(id, opts){
  opts = opts || {};
  const c = CLIENTES.find(x=>x.id===id);
  const nome = c ? c.nome : 'este cliente';
  if(!opts.auto && !confirm(`Gerar nova senha do portal para ${nome}? A senha atual (se houver) deixa de funcionar.`)) return;
  try{
    const { senha } = await api('clientes.gerar_senha_portal', { cliente_id: id });
    document.getElementById('senhaPortalLink').value = `${location.origin}/portal/`;
    document.getElementById('senhaPortalValor').value = senha;
    document.getElementById('modalSenha').classList.add('show');
  }catch(e){ toast('Erro ao gerar senha: '+e.message); }
}
function copiarSenhaPortal(){
  const link = document.getElementById('senhaPortalLink').value;
  const senha = document.getElementById('senhaPortalValor').value;
  const texto = `Acesse seu portal: ${link}\nSenha: ${senha}`;
  navigator.clipboard.writeText(texto).then(()=>toast('Link + senha copiados')).catch(()=>toast(texto));
}

/* MODAL ENTREGAS */
const CAT_LABEL = { arquivo:'Arquivo do projeto', apresentacao:'Apresentação', fonte:'Fonte' };
async function abrirEntregas(id, nome){
  document.getElementById('entCliId').value = id;
  document.getElementById('entCliNome').textContent = nome || '';
  document.getElementById('entArquivo').value = '';
  document.getElementById('modalEntregas').classList.add('show');
  await carregarEntregas();
}
async function carregarEntregas(){
  const id = document.getElementById('entCliId').value;
  const { entregas } = await api('entregas.list', { cliente_id: id });
  const linhas = [];
  Object.keys(entregas||{}).forEach(cat => {
    (entregas[cat]||[]).forEach(f => linhas.push(`<div class="svc" style="cursor:default"><div class="desc"><div class="d">${esc(f.nome)}</div><div class="m">${CAT_LABEL[cat]||cat}</div></div><button class="nf-pill" onclick="excluirEntrega('${esc(f.path)}')">🗑 excluir</button></div>`));
  });
  document.getElementById('entLista').innerHTML = linhas.length ? linhas.join('') : '<div class="empty">Nenhum arquivo ainda.</div>';
}
async function enviarEntrega(){
  const cliente_id = document.getElementById('entCliId').value;
  const categoria = document.getElementById('entCategoria').value;
  const file = document.getElementById('entArquivo').files[0];
  if(!file){ toast('Escolha um arquivo.'); return; }
  try{
    const { signed_url } = await api('entregas.upload_url', { cliente_id, categoria, filename: file.name });
    const put = await fetch(signed_url, { method:'PUT', headers:{'content-type':file.type||'application/octet-stream'}, body:file });
    if(!put.ok) throw new Error('Falha no upload');
    document.getElementById('entArquivo').value = '';
    toast('Arquivo enviado');
    await carregarEntregas();
  }catch(e){ toast('Erro: '+e.message); }
}
async function excluirEntrega(path){
  if(!confirm('Excluir este arquivo?')) return;
  try{ await api('entregas.delete', { path }); await carregarEntregas(); toast('Excluído'); }catch(e){ toast('Erro: '+e.message); }
}

/* MODAL CLIENTE */
function abrirCliente(c){
  const d = (c && c.id) ? c : null;
  document.getElementById('cliErr').textContent='';
  document.getElementById('cliId').value = d?d.id:'';
  document.getElementById('cliNome').value = d?d.nome:'';
  document.getElementById('cliCor').value = d?d.cor:'#7B2CBF';
  document.getElementById('cliContato').value = d&&d.contato?d.contato:'';
  document.getElementById('cliMarcaSlug').value = d&&d.marca_slug?d.marca_slug:'';
  document.getElementById('cliMarcaPublicada').checked = !!(d&&d.marca_publicada);
  document.getElementById('cliTitle').textContent = d?'Editar cliente':'Novo cliente';
  document.getElementById('cliDelBtn').style.display = d?'block':'none';
  document.getElementById('modalCliente').classList.add('show');
}
async function salvarCliente(){
  const err=document.getElementById('cliErr'); err.textContent='';
  const id=document.getElementById('cliId').value;
  const cliente = {
    nome:document.getElementById('cliNome').value.trim(),
    cor:document.getElementById('cliCor').value,
    contato:document.getElementById('cliContato').value.trim(),
    marca_slug:document.getElementById('cliMarcaSlug').value.trim().toLowerCase().replace(/[^a-z0-9-]+/g,'-').replace(/(^-|-$)/g,'') || null,
    marca_publicada:document.getElementById('cliMarcaPublicada').checked,
  };
  if(id) cliente.id=id;
  if(!cliente.nome){ err.textContent='Nome obrigatório.'; return; }
  const btn=document.getElementById('cliSaveBtn'); btn.disabled=true; btn.textContent='Salvando...';
  try{ await api('clientes.upsert',{ cliente }); fecharModal('modalCliente'); toast('Cliente salvo');
    await Promise.all([ carregarClientes(), carregarDashboard(), carregarServicos() ]);
  }catch(e){ err.textContent=e.message; }
  finally{ btn.disabled=false; btn.textContent='Salvar'; }
}
async function excluirCliente(){
  const id=document.getElementById('cliId').value; if(!id) return;
  if(!confirm('Excluir este cliente?')) return;
  try{ await api('clientes.delete',{ id }); fecharModal('modalCliente'); toast('Cliente excluído');
    await Promise.all([ carregarClientes(), carregarDashboard(), carregarServicos() ]);
  }catch(e){ document.getElementById('cliErr').textContent = e.message==='cliente tem serviços; mova ou exclua antes'?'Esse cliente tem serviços. Exclua os serviços antes.':e.message; }
}

/* util */
function fecharModal(id){ document.getElementById(id).classList.remove('show'); }
function trocarTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===t));
  document.getElementById('tabServicos').style.display = t==='servicos'?'block':'none';
  document.getElementById('tabClientes').style.display = t==='clientes'?'block':'none';
}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('show'); }));
document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); });
if (EloiAdminAuth.token()) { mostrarApp(); }
