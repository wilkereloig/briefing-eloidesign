<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplicativos — ELOI Design Studio</title>
  <link rel="stylesheet" href="https://use.typekit.net/ngx4uek.css">
  <link rel="stylesheet" href="/assets/eloi-admin/admin.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;padding:24px}
    .box{position:relative;z-index:1;width:100%;max-width:560px}
    .logo{width:160px;display:block;margin:0 auto 32px}
    .hub{display:none}
    .hub.show{display:block}
    .hub h1{font-size:1.5rem;font-variation-settings:'wght' 700;text-align:center;margin-bottom:8px;letter-spacing:-.02em}
    .hub .sub{text-align:center;color:var(--c300);font-size:.9rem;margin-bottom:28px}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:520px){.cards{grid-template-columns:1fr}}
    .nav-card{display:block;text-decoration:none;color:#fff;padding:30px 26px;transition:border-color .2s,transform .15s,background .2s;cursor:pointer;position:relative}
    .nav-card:hover{border-color:var(--c500);transform:translateY(-3px);background:rgba(45,0,85,.7)}
    .nav-card .ic{font-size:2rem;margin-bottom:14px;display:block}
    .nav-card .t{font-size:1.1rem;font-variation-settings:'wght' 600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
    .nav-card .t .ext{font-size:.7rem;color:var(--c300);border:1px solid var(--c700);border-radius:6px;padding:1px 7px;font-variation-settings:'wght' 500}
    .nav-card .d{font-size:.82rem;color:var(--c300)}
    .nav-card.soon{opacity:.45;pointer-events:none}
    .nav-card.soon .t .ext{border-color:var(--c800)}
    .actions{display:flex;gap:12px;justify-content:center;margin-top:24px}
  </style>
</head>
<body>
<div class="aurora"><span class="blob b1"></span><span class="blob b2"></span></div>

<div class="box">
  <div class="logo" id="logoSlot"></div>

  <!-- LOGIN -->
  <div class="card-base login" id="loginView">
    <h1>Aplicativos</h1>
    <input type="password" id="pw" placeholder="Senha de acesso" autocomplete="current-password">
    <button onclick="entrar()">Entrar</button>
    <div class="err" id="err"></div>
  </div>

  <!-- HUB -->
  <div class="hub" id="hubView">
    <h1>Aplicativos ELOI</h1>
    <p class="sub">Seus apps num só lugar</p>
    <div class="cards">
      <a class="card-base nav-card" href="https://eloi-financeiro.vercel.app" target="_blank" rel="noopener">
        <span class="ic">💸</span>
        <div class="t">ELOI Financeiro <span class="ext">abre ↗</span></div>
        <div class="d">Controle financeiro pessoal + empresa. Lançamentos, cartões, relatórios.</div>
      </a>
      <span class="card-base nav-card soon">
        <span class="ic">🗓️</span>
        <div class="t">Rotina AI <span class="ext">em breve</span></div>
        <div class="d">Agenda viva com IA, medicação, treino e hábitos.</div>
      </span>
    </div>
    <div class="actions">
      <a class="btn-ghost" href="/admin/">← Voltar ao painel</a>
      <button class="btn-ghost" onclick="sair()">Sair</button>
    </div>
  </div>
</div>

<script src="/assets/eloi-admin/auth.js"></script>
<script>
fetch('/assets/eloi-admin/wordmark.svg').then(r=>r.text()).then(svg=>{
  document.getElementById('logoSlot').innerHTML = svg;
});

function showHub(){ document.getElementById('loginView').style.display='none'; document.getElementById('hubView').classList.add('show'); }

async function entrar(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err'); err.textContent='Verificando...';
  try{
    await EloiAdminAuth.login(pw);
    err.textContent='';
    showHub();
  }catch(e){
    err.textContent = e.status === 401 ? 'Senha incorreta.' : 'Erro de conexão. Tente de novo.';
  }
}
function sair(){ EloiAdminAuth.logout(); location.reload(); }
document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); });

if (EloiAdminAuth.token()) { showHub(); }
</script>
</body>
</html>
