<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Briefings — ELOI Design Studio</title>
  <link rel="stylesheet" href="https://use.typekit.net/ngx4uek.css">
  <link rel="stylesheet" href="/assets/eloi-admin/admin.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c950:#10002B; --c900:#240046; --c800:#3C096C; --c700:#5A189A;
      --c600:#7B2CBF; --c500:#9D4EDD; --c300:#C77DFF; --c100:#E0AAFF;
      --white:#fff; --font:'carbona-variable', sans-serif;
      --ok:var(--good); --warn:var(--warn); --bad:var(--bad);
    }
    body { font-family:var(--font); background:var(--bg); color:var(--ink); min-height:100vh; line-height:1.6; }

    /* ── AURORA ── */
    .aurora { position:fixed; inset:-20%; z-index:0; pointer-events:none; filter:blur(90px);opacity:.28; }
    .blob { position:absolute; border-radius:50%;  }
    .blob.b1 { width:40%; height:45%; left:5%; top:2%; background:radial-gradient(circle,#9D4EDD,transparent 70%); animation:d1 20s ease-in-out infinite; }
    .blob.b2 { width:44%; height:50%; right:3%; top:-8%; background:radial-gradient(circle,#7B2CBF,transparent 70%); animation:d2 24s ease-in-out infinite; }
    .blob.b3 { width:36%; height:44%; left:34%; bottom:2%; background:radial-gradient(circle,#C77DFF,transparent 70%); animation:d3 17s ease-in-out infinite; }
    @keyframes d1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(26%,18%) scale(1.2)} }
    @keyframes d2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-22%,20%) scale(1.15)} }
    @keyframes d3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20%,-22%) scale(1.25)} }

    .wrap { position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:32px 24px 80px; }

    /* ── LOGIN ── */

    /* ── HEADER ── */
    .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; gap:16px; flex-wrap:wrap; }
    .top svg { height:56px; width:auto; display:block; }
    .top h1 { font-size:1.05rem; font-variation-settings:'wght' 500; color:var(--ink-2); }
    .count-badge { background:var(--c700); color:#fff; font-size:0.8rem; font-variation-settings:'wght' 700; padding:4px 12px; border-radius:99px; }

    /* ── LIST ── */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px; cursor:pointer; transition:border-color .2s, transform .15s, background .2s; }
    .card:hover { border-color:var(--brand); transform:translateY(-2px); background:var(--surface-2); }
    .card-empresa { font-size:1.05rem; font-variation-settings:'wght' 600; margin-bottom:4px; }
    .card-nome { font-size:0.85rem; color:var(--muted); margin-bottom:14px; }
    .card-meta { display:flex; justify-content:space-between; align-items:center; font-size:0.78rem; color:var(--muted); opacity:.8; }
    .card-tag { background:var(--surface-3); padding:3px 10px; border-radius:99px; font-variation-settings:'wght' 600; }
    .card-mini-colors { display:flex; gap:4px; margin-top:12px; }
    .card-mini-colors span { width:16px; height:16px; border-radius:4px; border:1px solid rgba(255,255,255,.15); }

    .empty-state { text-align:center; padding:80px 24px; color:var(--muted); }
    .empty-state .ic { font-size:3rem; margin-bottom:16px; opacity:.5; }

    /* ── DETAIL ── */
    .detail { display:none; }
    .detail.show { display:block; }
    .list-view.hide { display:none; }
    .back-btn { display:inline-flex; align-items:center; gap:8px; background:transparent; border:1px solid var(--line); color:var(--ink-2); font-family:var(--font); font-size:0.9rem; padding:10px 18px; border-radius:10px; cursor:pointer; margin-bottom:24px; transition:border-color .2s, background .2s; }
    .back-btn:hover { border-color:var(--brand); background:rgba(90,24,154,.2); }

    .detail-head { background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:28px 30px; margin-bottom:20px; }
    .detail-head h2 { font-size:1.6rem; font-variation-settings:'wght' 700; letter-spacing:-.02em; margin-bottom:6px; }
    .detail-head .sub { color:var(--muted); font-size:0.9rem; margin-bottom:16px; }
    .contact-row { display:flex; gap:20px; flex-wrap:wrap; font-size:0.875rem; }
    .contact-row a, .contact-row span { color:var(--ink-2); text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .contact-row a:hover { color:var(--muted); }

    .actions { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; gap:8px; border:none; border-radius:10px; font-family:var(--font); font-size:0.9rem; font-variation-settings:'wght' 600; padding:12px 22px; cursor:pointer; transition:background .2s, transform .15s; }
    .btn-primary { background:var(--c700); color:#fff; }
    .btn-primary:hover { background:var(--c600); transform:translateY(-1px); }
    .btn-ghost { background:transparent; color:var(--ink-2); border:1px solid var(--line); }
    .btn-ghost:hover { border-color:var(--brand); background:rgba(90,24,154,.2); }

    .section { background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:24px 28px; margin-bottom:18px; }
    .section h3 { font-size:0.78rem; text-transform:uppercase; letter-spacing:.1em; color:var(--brand); font-variation-settings:'wght' 700; margin-bottom:18px; }
    .qa { margin-bottom:18px; }
    .qa:last-child { margin-bottom:0; }
    .qa-q { font-size:0.8rem; color:var(--muted); font-variation-settings:'wght' 600; margin-bottom:3px; }
    .qa-a { font-size:0.95rem; white-space:pre-wrap; color:var(--ink); }
    .qa-a.empty { color:var(--muted); opacity:.45; font-style:italic; }

    /* ── COLOR PALETTE ── */
    .palette { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:14px; }
    .swatch { border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,.12); }
    .swatch-color { height:80px; }
    .swatch-info { padding:8px 10px; background:rgba(0,0,0,.25); }
    .swatch-name { font-size:0.82rem; font-variation-settings:'wght' 600; }
    .swatch-hex { font-size:0.72rem; color:var(--muted); font-family:monospace; text-transform:uppercase; }
    .palette-note { font-size:0.85rem; color:var(--ink-2); background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.3); border-radius:10px; padding:12px 16px; margin-top:16px; }

    /* ── BRIEF NATURAL ── */
    .brief-box { white-space:pre-wrap; font-size:0.95rem; line-height:1.7; color:var(--ink); background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:22px; max-height:480px; overflow:auto; }

    /* ── PENDÊNCIAS ── */
    .pend-list { list-style:none; display:flex; flex-direction:column; gap:10px; }
    .pend-item { display:flex; gap:12px; align-items:flex-start; font-size:0.9rem; background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.25); border-radius:10px; padding:12px 14px; }
    .pend-item .pic { color:var(--warn); flex-shrink:0; font-size:1rem; line-height:1.4; }
    .pend-ok { color:var(--ok); font-size:0.9rem; display:flex; gap:10px; align-items:center; }

    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--c700); color:#fff; padding:14px 26px; border-radius:12px; font-size:0.9rem; font-variation-settings:'wght' 600; box-shadow:0 10px 30px rgba(0,0,0,.4); z-index:50; transition:transform .35s cubic-bezier(.34,1.56,.64,1); }
    .toast.show { transform:translateX(-50%) translateY(0); }

    @media (max-width:600px){ .detail-head{padding:22px} .section{padding:18px 18px} }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginView">
  <div class="login-card">
    <div class="logo" id="logoSlotLogin"></div>
    <h1>Painel de Briefings</h1>
    <input type="password" id="pwInput" placeholder="Senha de acesso" autocomplete="current-password">
    <button onclick="login()">Entrar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- AURORA (painel) -->
<div class="aurora" id="auroraBg" style="display:none"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

<!-- PAINEL -->
<div class="wrap" id="panelView" style="display:none">
  <div class="top">
    <div id="logoSlotTop"></div>
    <div style="display:flex;align-items:center;gap:12px">
      <h1>Briefings recebidos</h1>
      <span class="count-badge" id="countBadge">0</span>
      <button class="btn-ghost" onclick="sair()">Sair</button>
    </div>
  </div>

  <!-- LISTA -->
  <div class="list-view" id="listView"></div>

  <!-- DETALHE -->
  <div class="detail" id="detailView"></div>
</div>

<div class="toast" id="toast">Copiado!</div>

<script src="/assets/eloi-admin/auth.js"></script>
<script>
fetch('/assets/eloi-admin/wordmark.svg').then(r=>r.text()).then(svg=>{
  document.getElementById('logoSlotLogin').innerHTML = svg;
  document.getElementById('logoSlotTop').innerHTML = svg;
});

const SUPA_URL = 'https://nlamznxoocmygfvnqcns.supabase.co';
const FN = SUPA_URL + '/functions/v1/get-briefings';
let BRIEFINGS = [];

// ── mapa hex → nome ──
const COLOR_NAMES = {
  '#E91E8C':'Magenta','#E91E63':'Rosa','#FF69B4':'Rosa-pink','#EC407A':'Rosa',
  '#D32F2F':'Vermelho','#F44336':'Vermelho','#B71C1C':'Vermelho-escuro',
  '#FFD700':'Amarelo-ouro','#FFC107':'Amarelo','#FFEB3B':'Amarelo-claro',
  '#E8651A':'Laranja','#FF9800':'Laranja','#FF5722':'Laranja-forte',
  '#C1440E':'Terracota','#5D4037':'Marrom','#795548':'Marrom-claro',
  '#8BC34A':'Verde-claro','#388E3C':'Verde','#4CAF50':'Verde','#00897B':'Verde-água','#009688':'Verde-água',
  '#4FC3F7':'Azul-claro','#2196F3':'Azul','#03A9F4':'Azul-céu','#3F51B5':'Índigo','#1A237E':'Azul-marinho',
  '#8B00FF':'Violeta','#9C27B0':'Roxo','#673AB7':'Roxo-profundo',
  '#757575':'Cinza','#9E9E9E':'Cinza-claro','#607D8B':'Cinza-azulado',
  '#111111':'Preto','#000000':'Preto','#FFFFFF':'Branco','#F5F5F5':'Off-white'
};
function colorName(hex){ return COLOR_NAMES[hex.toUpperCase()] || 'Cor personalizada'; }

// ── mapas de valores ──
const MAP = {
  q12:{criacao:'Empresa nova — criação do zero', rebranding:'Rebranding — renovar marca existente', atualizacao:'Atualização de logo'},
  q13:{sim:'Sim', nao:'Não', em_processo:'Em processo'},
  q14:{sim:'Sim', nao:'Não', em_processo:'Em processo', nao_sei:'Não sabe o que é'},
  q15:{sim:'Sim', nao:'Não', nao_sei:'Não sabe o que é'},
  q16:{sim:'Sim', nao:'Não', sem_site:'Não tem site'},
  q17:{todas:'Sim, em todas', algumas:'Sim, em algumas', nao:'Não'},
  q18:{site_institucional:'Site institucional', landing_page:'Landing page', ecommerce:'E-commerce', aplicativo:'Aplicativo', embalagem:'Embalagens e rótulos', papelaria:'Papelaria', sinalizacao:'Sinalização', video_motion:'Vídeo e motion', fotografia:'Fotografia', impressos:'Materiais impressos', outro:'Outro', nenhum:'Nenhum'}
};
function mapVal(field,val){
  if(!val) return '';
  const m = MAP[field]; if(!m) return val;
  return String(val).split(',').map(v=>m[v.trim()]||v.trim()).join(', ');
}

// ── LOGIN ──
async function login(){
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  err.textContent = 'Entrando...';
  try{
    await EloiAdminAuth.login(pw);
    err.textContent = '';
    await mostrarConteudo();
  }catch(e){
    err.textContent = e.status === 401 ? 'Senha incorreta.' : 'Erro de conexão. Tente de novo.';
  }
}
document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });

async function mostrarConteudo(){
  document.getElementById('loginView').style.display='none';
  document.getElementById('panelView').style.display='block';
  document.getElementById('auroraBg').style.display='block';
  const data = await EloiAdminAuth.call(FN, {});
  BRIEFINGS = data.briefings || [];
  renderList();
}

function sair(){ EloiAdminAuth.logout(); location.reload(); }

// login automático se já houver sessão
if (EloiAdminAuth.token()) { mostrarConteudo(); }

// ── LISTA ──
function renderList(){
  document.getElementById('detailView').classList.remove('show');
  document.getElementById('listView').classList.remove('hide');
  document.getElementById('countBadge').textContent = BRIEFINGS.length;
  const lv = document.getElementById('listView');
  if(!BRIEFINGS.length){ lv.className='list-view'; lv.innerHTML = '<div class="empty-state"><div class="ic">📭</div>Nenhum briefing recebido ainda.</div>'; return; }
  lv.className = 'list-view grid';
  lv.innerHTML = BRIEFINGS.map((b,i)=>{
    const cores = (b.q11_cores||'').split(',').map(c=>c.trim()).filter(Boolean).slice(0,6);
    const dots = cores.map(c=>`<span style="background:${esc(c)}"></span>`).join('');
    const dt = b.created_at ? new Date(b.created_at).toLocaleDateString('pt-BR') : '';
    return `<div class="card" onclick="openDetail(${i})">
      <div class="card-empresa">${esc(b.q1||b.nome||'Sem nome')}</div>
      <div class="card-nome">${esc(b.nome||'')}</div>
      <div class="card-meta"><span class="card-tag">${esc(mapVal('q12',b.q12)||'—')}</span><span>#${b.numero||'—'} · ${dt}</span></div>
      ${dots?`<div class="card-mini-colors">${dots}</div>`:''}
    </div>`;
  }).join('');
}

// ── DETALHE ──
function openDetail(i){
  const b = BRIEFINGS[i];
  const dv = document.getElementById('detailView');
  document.getElementById('listView').classList.add('hide');
  dv.classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});

  const cores = (b.q11_cores||'').split(',').map(c=>c.trim()).filter(Boolean);
  const swatches = cores.map(c=>`<div class="swatch"><div class="swatch-color" style="background:${esc(c)}"></div><div class="swatch-info"><div class="swatch-name">${esc(colorName(c))}</div><div class="swatch-hex">${esc(c)}</div></div></div>`).join('');

  const qa = (f,label)=>{ const val = MAP[f]?mapVal(f,b[f]):b[f]; return `<div class="qa"><div class="qa-q">${esc(label)}</div><div class="qa-a ${val?'':'empty'}">${val?esc(val):'— não respondido'}</div></div>`; };

  const dt = b.created_at ? new Date(b.created_at).toLocaleString('pt-BR') : '';
  const wa = (b.whatsapp||'').replace(/\D/g,'');
  const waLink = wa.length>=10 ? `https://wa.me/55${wa}` : '#';

  dv.innerHTML = `
    <button class="back-btn" onclick="renderList()">← Voltar à lista</button>
    <div class="detail-head">
      <h2>${esc(b.q1||b.nome||'Briefing')}</h2>
      <div class="sub">Briefing #${b.numero||'—'} · Recebido em ${dt}</div>
      <div class="contact-row">
        <span>👤 ${esc(b.nome||'—')}</span>
        ${b.email?`<a href="mailto:${esc(b.email)}">✉️ ${esc(b.email)}</a>`:''}
        ${wa.length>=10?`<a href="${waLink}" target="_blank">💬 ${esc(b.whatsapp)}</a>`:(b.whatsapp?`<span>💬 ${esc(b.whatsapp)} ⚠️</span>`:'')}
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="copyAll(${i})">📋 Copiar tudo (para IA)</button>
      <button class="btn btn-ghost" onclick="copyBrief(${i})">📝 Copiar briefing</button>
      <button class="btn btn-ghost" onclick="window.print()">🖨️ Imprimir / PDF</button>
    </div>

    <div class="section">
      <h3>📌 Pendências e pontos a confirmar</h3>
      ${renderPend(b)}
    </div>

    <div class="section">
      <h3>✨ Briefing — versão para criação</h3>
      <div class="brief-box" id="briefBox">${esc(gerarBrief(b))}</div>
    </div>

    <div class="section">
      <h3>🎨 Cores que o cliente NÃO quer</h3>
      ${cores.length?`<div class="palette">${swatches}</div>`:'<div class="qa-a empty">Nenhuma cor marcada.</div>'}
      ${b.q11_texto?`<div class="palette-note"><strong>Estilos a evitar:</strong> ${esc(b.q11_texto)}</div>`:''}
    </div>

    <div class="section">
      <h3>🏢 Sobre o negócio</h3>
      ${qa('q1','Nome da empresa / marca')}
      ${qa('q2','O que a empresa faz')}
      ${qa('q3','Missão e valores')}
      ${qa('q4','Cliente ideal')}
      ${qa('q5','Onde o público está')}
      ${qa('q6','Concorrentes')}
      ${qa('q7','Diferencial')}
      ${qa('q8','Personalidade da marca')}
      ${qa('q9','Sentimento a transmitir')}
    </div>

    <div class="section">
      <h3>🖼️ Referências</h3>
      ${qa('q10_descricao','Descrição')}
      ${qa('q10_link','Links')}
    </div>

    <div class="section">
      <h3>⚖️ Registro e legal</h3>
      ${qa('q12','Tipo de projeto')}
      ${qa('q13','CNPJ registrado')}
      ${qa('q14','Registro INPI')}
      ${qa('q15','Pesquisa de anterioridade')}
      ${qa('q16','Domínio de site')}
      ${qa('q17','Redes sociais com o nome')}
    </div>

    <div class="section">
      <h3>🚀 Serviços de interesse</h3>
      ${qa('q18','Serviços')}
      ${b.q18_outro?qa('q18_outro','Outro'):''}
    </div>
  `;
}

// ── PENDÊNCIAS ──
function pendencias(b){
  const out = [];
  if(!b.q6) out.push('Concorrentes não informados — perguntar quem o cliente considera concorrência direta.');
  if(!b.q10_descricao && !b.q10_link) out.push('Nenhuma referência visual enviada — pedir 3 a 5 imagens ou perfis que o cliente admira.');
  if(!b.q3) out.push('Missão e valores em branco — explorar em conversa para dar direção ao conceito.');
  if(!b.q5) out.push('Não informou onde o público está — confirmar canais (Instagram, indicação, local...).');
  if(!b.q7) out.push('Diferencial não informado — entender o que faz o cliente ser escolhido.');
  if(b.q14==='nao'||b.q14==='nao_sei') out.push('Marca NÃO registrada no INPI — orientar sobre registro para proteger o nome.');
  if(b.q15==='nao'||b.q15==='nao_sei') out.push('Pesquisa de anterioridade não feita — verificar disponibilidade do nome antes de finalizar.');
  if(b.q16==='sem_site'||b.q16==='nao') out.push('Sem domínio/site — sugerir registro de domínio junto ao projeto.');
  const wa = (b.whatsapp||'').replace(/\D/g,'');
  if(b.whatsapp && wa.length<10) out.push('WhatsApp parece incompleto ('+b.whatsapp+') — confirmar número com DDD.');
  if(!b.q11_cores && !b.q11_texto) out.push('Não indicou cores/estilos a evitar — confirmar restrições visuais.');
  return out;
}
function renderPend(b){
  const p = pendencias(b);
  if(!p.length) return '<div class="pend-ok">✅ Briefing completo — nenhuma pendência crítica detectada.</div>';
  return '<ul class="pend-list">'+p.map(x=>`<li class="pend-item"><span class="pic">⚠️</span><span>${esc(x)}</span></li>`).join('')+'</ul>';
}

// ── BRIEF NATURAL ──
function gerarBrief(b){
  const L=[];
  const empresa = b.q1||b.nome||'Cliente';
  L.push(`BRIEFING DE IDENTIDADE VISUAL — ${empresa}`);
  L.push('');
  L.push(`Cliente: ${b.nome||'—'} | ${b.email||'—'} | ${b.whatsapp||'—'}`);
  if(b.q12) L.push(`Tipo de projeto: ${mapVal('q12',b.q12)}`);
  L.push('');
  if(b.q2){ L.push('O NEGÓCIO'); L.push(b.q2); L.push(''); }
  if(b.q3){ L.push('MISSÃO E VALORES'); L.push(b.q3); L.push(''); }
  if(b.q4){ L.push('PÚBLICO-ALVO'); L.push(b.q4); L.push(''); }
  if(b.q5){ L.push('ONDE O PÚBLICO ESTÁ'); L.push(b.q5); L.push(''); }
  if(b.q6 || b.q7){ L.push('MERCADO E DIFERENCIAL'); if(b.q6)L.push('Concorrentes: '+b.q6); if(b.q7)L.push('Diferencial: '+b.q7); L.push(''); }
  if(b.q8 || b.q9){ L.push('PERSONALIDADE DA MARCA'); if(b.q8)L.push('Tom: '+b.q8); if(b.q9)L.push('Sentimentos: '+b.q9); L.push(''); }
  const cores=(b.q11_cores||'').split(',').map(c=>c.trim()).filter(Boolean);
  if(cores.length || b.q11_texto){
    L.push('DIREÇÃO VISUAL');
    if(cores.length) L.push('Cores a EVITAR: '+cores.map(c=>colorName(c)+' ('+c+')').join(', '));
    if(b.q11_texto) L.push('Estilos a evitar: '+b.q11_texto);
    if(b.q10_descricao) L.push('Referências: '+b.q10_descricao);
    if(b.q10_link) L.push('Links: '+b.q10_link);
    L.push('');
  }
  L.push('REGISTRO E LEGAL');
  L.push(`CNPJ: ${mapVal('q13',b.q13)||'—'} | INPI: ${mapVal('q14',b.q14)||'—'} | Anterioridade: ${mapVal('q15',b.q15)||'—'} | Domínio: ${mapVal('q16',b.q16)||'—'} | Redes: ${mapVal('q17',b.q17)||'—'}`);
  L.push('');
  if(b.q18){ L.push('SERVIÇOS DE INTERESSE'); L.push(mapVal('q18',b.q18)+(b.q18_outro?', '+b.q18_outro:'')); L.push(''); }
  const p=pendencias(b);
  if(p.length){ L.push('PONTOS A CONFIRMAR COM O CLIENTE'); p.forEach(x=>L.push('- '+x)); }
  return L.join('\n');
}

// ── COPIAR ──
function copyBrief(i){ copyText(gerarBrief(BRIEFINGS[i]), 'Briefing copiado!'); }
function copyAll(i){
  const b=BRIEFINGS[i];
  let t = gerarBrief(b) + '\n\n=== INSTRUÇÃO PARA IA ===\n';
  t += 'Com base no briefing acima, gere conceitos criativos de identidade visual: territórios de marca, direções de logo, paleta de cores (respeitando as cores a evitar), tipografia sugerida e tom visual. Seja específico e ofereça 3 caminhos distintos.';
  copyText(t, 'Copiado! Cole numa IA.');
}
function copyText(t, msg){
  navigator.clipboard.writeText(t).then(()=>showToast(msg)).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast(msg);
  });
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

// ── util ──
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
