<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#F7F4FB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ELOI">
  <title>ELOI Design Studio — Briefing de Projeto</title>
  <link rel="stylesheet" href="https://use.typekit.net/ngx4uek.css">
  <link rel="stylesheet" href="/assets/eloi-admin/admin.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c950: #10002B;
      --c900: #240046;
      --c800: #3C096C;
      --c700: #5A189A;
      --c600: #7B2CBF;
      --c500: #9D4EDD;
      --c300: #C77DFF;
      --c100: #E0AAFF;
      --white: #FFFFFF;
      --font: 'carbona-variable', sans-serif;
    }

    body {
      font-family: var(--font);
      background:var(--bg);
      color:var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
      position: relative;
      overflow: hidden;
    }

    /* ── AURORA ── manchas de luz em movimento */
    .aurora {
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      filter: blur(90px);
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      
      opacity: 0.30;
    }
    .blob.b1 {
      width: 38%; height: 45%;
      left: 6%; top: 4%;
      background: radial-gradient(circle at 30% 30%, #9D4EDD, transparent 70%);
      animation: drift1 18s ease-in-out infinite;
    }
    .blob.b2 {
      width: 42%; height: 50%;
      right: 4%; top: -6%;
      background: radial-gradient(circle at 70% 40%, #7B2CBF, transparent 70%);
      animation: drift2 21s ease-in-out infinite;
    }
    .blob.b3 {
      width: 34%; height: 42%;
      left: 32%; bottom: 2%;
      background: radial-gradient(circle at 50% 50%, #C77DFF, transparent 70%);
      animation: drift3 15s ease-in-out infinite;
    }
    .blob.b4 {
      width: 30%; height: 40%;
      left: -4%; bottom: 0%;
      background: radial-gradient(circle at 40% 60%, #5A189A, transparent 70%);
      animation: drift1 24s ease-in-out infinite reverse;
    }
    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(28%, 16%) scale(1.25); }
      66%     { transform: translate(-16%, 24%) scale(0.85); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%     { transform: translate(-24%, 20%) scale(1.2); }
      75%     { transform: translate(14%, -10%) scale(0.9); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(20%, -22%) scale(1.3); }
    }
    @media (prefers-reduced-motion: reduce) {
      .blob { animation: none !important; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50%      { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    /* Um eixo a esquerda: logo, titulo, texto, botao e rodape na mesma linha
       vertical. Raio pequeno e filete no lugar de espaco vago — a wordmark e
       blocada e sem curva, o container acompanha em vez de contradizer. */
    .card {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      text-align: left;
      background: var(--surface);
      border:1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 48px 44px;
      box-shadow: var(--sh-3);
    }

    .logo {
      display: block;
      margin-bottom: 26px;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.1s forwards;
    }
    .logo img { height: clamp(72px, 13vw, 96px); width: auto; display: block; }

    .title {
      font-size: clamp(1.5rem, 5vw, 2.125rem);
      font-variation-settings: 'wght' 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 14px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.25s forwards;
    }

    /* Medida em ch: o limite e a linha legivel (~52 caracteres), nao um px
       arbitrario — ele acompanha a fonte em vez de brigar com ela. */
    .subtitle {
      font-size: 1.0625rem;
      font-variation-settings: 'wght' 400;
      color:var(--ink-2);
      max-width: 52ch;
      margin: 0 0 32px;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.4s forwards;
    }

    /* Barra, nao pilula: largura total, rotulo a esquerda, seta empurrada pelo
       space-between. Mesmo gesto do botao de login — as duas portas combinam. */
    .cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-variation-settings: 'wght' 600;
      letter-spacing: 0.01em;
      padding: 17px 22px;
      border-radius: var(--r-sm);
      transition: background 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.55s forwards;
    }
    .cta:hover {
      background: var(--brand-hover);
      box-shadow: 0 6px 18px rgba(90,24,154,.22);
    }
    .cta svg { width: 18px; height: 18px; flex: 0 0 auto; transition: transform 0.2s; }
    .cta:hover svg { transform: translateX(4px); }

    .meta {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 0.8125rem;
      color:var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.7s forwards;
    }
    .meta a { color:var(--muted); text-decoration: none; border-bottom: 1px solid var(--line-strong); transition: border-color 0.2s, color 0.2s; }
    .meta a:hover { border-color:var(--brand); color:var(--brand); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* No celular a tela E o card: moldura flutuante e gesto de desktop.
       Borda, raio, sombra e goteira saem; safe-area entra. */
    @media (max-width: 600px) {
      body { padding: 0; align-items: stretch; }
      .card {
        max-width: none;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        padding: max(env(safe-area-inset-top), 28px) 24px max(env(safe-area-inset-bottom), 28px);
      }
      /* cadeado de admin e fixo no canto: reserva a faixa dele pro rodape
         nao passar por baixo */
      .meta { margin-top: auto; padding-top: 28px; padding-right: 46px; }
      .admin-lock { bottom: max(env(safe-area-inset-bottom), 16px); }
    }
  </style>
</head>
<body>
  <div class="aurora">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="blob b4"></span>
  </div>
  <div class="card">
    <div class="logo">
      <img src="/assets/eloi-admin/wordmark.svg" alt="ELOI Design Studio">
    </div>

    <h1 class="title">Vamos criar sua marca</h1>
    <p class="subtitle">
      Preencha nosso briefing de identidade visual. Leva poucos minutos e nos ajuda a entender o seu projeto a fundo.
    </p>

    <a href="/briefing/" class="cta">
      Preencher Briefing
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>

    <p class="meta">
      ELOI Design Studio · <a href="mailto:contato@eloidesign.com.br">contato@eloidesign.com.br</a>
    </p>
  </div>

  <a href="/admin/" class="admin-lock" title="Área administrativa" aria-label="Área administrativa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </a>
  <style>
    .admin-lock{position:fixed;bottom:16px;right:16px;z-index:5;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--muted);opacity:.25;transition:opacity .2s,background .2s,color .2s;text-decoration:none}
    .admin-lock:hover{opacity:.9;background:var(--brand-soft);color:var(--ink)}
    .admin-lock svg{width:18px;height:18px}
  </style>
</body>
</html>
