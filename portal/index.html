<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Cliente — ELOI Design Studio</title>
  <link rel="stylesheet" href="https://use.typekit.net/ngx4uek.css">
  <link rel="stylesheet" href="/assets/eloi-admin/admin.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    a{color:var(--muted)}
    .hidden{display:none!important}
    .wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 24px 80px}

    .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
    .login .logo{height:88px;margin:0 0 26px;display:block;text-align:left}
    .login .logo svg{height:100%;width:auto;display:block}

    .preview-banner{background:var(--warn);color:#3d2c00;border-radius:10px;padding:12px 18px;margin:18px 0 0;font-size:.86rem;line-height:1.45}
    .preview-banner strong{font-variation-settings:'wght' 700}

    .topbar .logo{height:48px}
    .topbar .logo svg{height:100%;width:auto;display:block}
    .topbar h1{font-size:1.05rem;font-variation-settings:'wght' 600}
    .topbar .sub{font-size:.8rem;color:var(--muted)}

    .tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
    .tab-btn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:99px;padding:9px 20px;font-family:var(--font);font-size:.88rem;cursor:pointer;transition:all .2s}
    .tab-btn:hover{border-color:var(--brand)}
    .tab-btn.active{background:var(--c700);border-color:var(--brand);color:#fff}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .marca-card{padding:44px;text-align:center;max-width:420px;margin:20px auto}
    .marca-card .ic{font-size:2.4rem;margin-bottom:14px}
    .marca-card h2{font-size:1.2rem;font-variation-settings:'wght' 700;margin-bottom:8px}
    .marca-card p{color:var(--muted);font-size:.9rem;margin-bottom:22px}

    .rows{display:flex;flex-direction:column;gap:10px}
    .row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .row .grow{flex:1;min-width:180px}
    .row .t{font-variation-settings:'wght' 600;font-size:.96rem}
    .row .meta{font-size:.78rem;color:var(--muted)}
    .btn-sm{padding:7px 14px;font-size:.8rem}

    .badge{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;font-variation-settings:'wght' 700;padding:3px 10px;border-radius:99px;white-space:nowrap}
    .badge.rascunho{background:rgba(156,163,175,.2);color:#9ca3af}
    .badge.enviado{background:rgba(96,165,250,.2);color:#60a5fa}
    .badge.aprovado,.badge.pago,.badge.respondido{background:rgba(74,222,128,.2);color:var(--good)}
    .badge.recusado{background:rgba(248,113,113,.2);color:var(--bad)}
    .badge.em_execucao,.badge.pendente{background:rgba(157,78,221,.2);color:var(--ink-2)}
    .badge.concluida{background:rgba(96,165,250,.2);color:#60a5fa}
    .badge.aberto{background:rgba(248,113,113,.15);color:var(--bad)}

    .empty{text-align:center;padding:60px 24px;color:var(--muted)}
    .empty .ic{font-size:2.4rem;opacity:.5;margin-bottom:14px}

    .marca-hero{padding:32px;border-radius:16px;text-align:center;margin-bottom:20px}
    .marca-hero img{max-width:200px;margin:0 auto 14px;display:block}
    .marca-hero .nm{font-variation-settings:'wght' 700;font-size:1.15rem}
    .paleta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}
    .paleta-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:6px 14px 6px 6px;font-size:.82rem;color:#fff;cursor:pointer;font-family:var(--font)}
    .paleta-chip:hover{border-color:var(--brand)}
    .paleta-chip .sw{width:22px;height:22px;border-radius:50%;border:1px solid rgba(255,255,255,.25);flex:none}
    .zip-cta{display:flex;justify-content:space-between;align-items:center;gap:12px;background:rgba(157,78,221,.1);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:22px;flex-wrap:wrap}
    .variacao-h{font-size:.88rem;font-variation-settings:'wght' 600;color:var(--ink-2);margin:20px 0 10px}
    .swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
    .swatch{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
    .swatch .prev{aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:14px}
    .swatch .prev img{max-width:100%;max-height:100%}
    .swatch .dl{display:flex;gap:6px;padding:8px;border-top:1px solid var(--line)}
    .swatch .dl a{flex:1;text-align:center;font-size:.7rem;color:var(--ink-2);text-decoration:none;border:1px solid var(--line-strong);border-radius:6px;padding:4px}
    .swatch .dl-bg{width:calc(100% - 16px);margin:6px 8px 8px;display:block;font-size:.68rem;color:var(--muted);background:transparent;border:1px dashed var(--c700);border-radius:6px;padding:5px;cursor:pointer;font-family:var(--font);transition:border-color .15s,color .15s}
    .swatch .dl-bg:hover{border-color:var(--brand);color:#fff}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--c700);color:#fff;padding:12px 22px;border-radius:10px;font-size:.88rem;opacity:0;transition:opacity .25s;pointer-events:none}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="aurora"><span class="blob b1"></span><span class="blob b2"></span></div>

<!-- LOGIN -->
<div class="login" id="loginView">
  <div class="card-base login-box" style="padding:44px 40px;max-width:380px;width:100%;text-align:center">
    <div class="logo" id="logoSlot"></div>
    <h1 style="font-size:1.15rem;font-variation-settings:'wght' 600;margin-bottom:4px" id="loginTitulo">Portal do Cliente</h1>
    <p id="loginCliente" style="font-size:.86rem;color:var(--c300);margin-bottom:20px;display:none"></p>
    <input type="password" id="pw" placeholder="Cole sua senha (ex: HC2T-eloi-cliente-2026)" autocomplete="current-password">
    <button onclick="entrar()">Entrar</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- PORTAL -->
<div class="wrap hidden" id="portalView">
  <div class="preview-banner hidden" id="previewBanner">
    👁 <strong>Modo preview</strong> — você está vendo este portal como <span id="previewNome"></span>. O cliente não vê esta faixa.
  </div>
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="logo" id="logoSlotTop"></div>
      <div>
        <h1>Portal do cliente</h1>
        <div class="sub" id="clienteNome"></div>
      </div>
    </div>
    <div class="actions"><button class="btn-ghost" onclick="sair()">Sair</button></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="marca">Marca</button>
    <button class="tab-btn" data-tab="arquivos">Arquivos</button>
    <button class="tab-btn" data-tab="nf">Notas Fiscais</button>
    <button class="tab-btn" data-tab="orc">Orçamentos</button>
    <button class="tab-btn" data-tab="briefing">Briefing</button>
  </div>

  <div class="tab-panel active" id="tab-marca"></div>
  <div class="tab-panel" id="tab-arquivos"></div>
  <div class="tab-panel" id="tab-nf"></div>
  <div class="tab-panel" id="tab-orc"></div>
  <div class="tab-panel" id="tab-briefing"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const FN = 'https://nlamznxoocmygfvnqcns.supabase.co/functions/v1/portal-cliente';
const PT_KEY = 'eloi_portal_token';
let CLIENTE = {}, SERVICOS = [], ORCAMENTOS = [], BRIEFINGS = [];

function token(){ return sessionStorage.getItem(PT_KEY); }
// ?next= só aceita caminho interno (começa com "/" e não "//") — evita open-redirect
function nextParam(){
  const n = new URLSearchParams(location.search).get('next');
  return (n && /^\/(?!\/)/.test(n)) ? n : null;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function brl(n){ return 'R$ ' + (Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(s){ return s ? new Date(s).toLocaleDateString('pt-BR') : '—'; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

fetch('/assets/eloi-admin/wordmark.svg').then(r=>r.text()).then(svg=>{
  document.getElementById('logoSlot').innerHTML = svg;
  document.getElementById('logoSlotTop').innerHTML = svg;
});

function mostrarLogin(){ document.getElementById('portalView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }
function mostrarConteudo(){ document.getElementById('loginView').classList.add('hidden'); document.getElementById('portalView').classList.remove('hidden'); }

async function callPortal(action, payload){
  const r = await fetch(FN, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action, token: token(), ...(payload||{}) }) });
  const d = await r.json().catch(()=>({}));
  if (r.status === 401) { sessionStorage.removeItem(PT_KEY); mostrarLogin(); throw new Error('sessão expirada'); }
  if (d && d.error) throw new Error(d.error);
  return d;
}

async function entrar(){
  const pw = document.getElementById('pw').value.trim();
  const err = document.getElementById('err');
  if (!pw) { err.textContent = 'Cole sua senha.'; return; }
  err.textContent = 'Verificando...';
  try {
    const r = await fetch(FN, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'login', senha: pw }) });
    const d = await r.json().catch(()=>({}));
    if (!r.ok || !d.token) throw new Error();
    sessionStorage.setItem(PT_KEY, d.token);
    err.textContent = '';
    const nxt = nextParam();
    if (nxt) { location.href = nxt; return; }   // volta pra página que pediu login
    mostrarConteudo();
    await carregarDados();
  } catch (e) {
    // ponytail: erro genérico pra qualquer falha (senha errada, prefixo inexistente,
    // rate-limit, rede) — pedido explícito do contrato, não vaza qual caso é
    err.textContent = 'Senha incorreta.';
  }
}
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });

function sair(){
  callPortal('logout').catch(()=>{});
  sessionStorage.removeItem(PT_KEY);
  location.reload();
}

async function carregarDados(){
  try {
    const [me, sv, oc, br] = await Promise.all([
      callPortal('me'),
      callPortal('servicos.list'),
      callPortal('orcamentos.list'),
      callPortal('briefings.list'),
    ]);
    CLIENTE = me.cliente || {};
    SERVICOS = sv.servicos || [];
    ORCAMENTOS = oc.orcamentos || [];
    BRIEFINGS = br.briefings || [];
    document.getElementById('clienteNome').textContent = CLIENTE.nome || '';
    renderNF(); renderOrc(); renderBriefing();
    renderMarca(); renderArquivos();
  } catch (e) { /* 401 já trocou pra tela de login dentro de callPortal */ }
}

// ── MARCA (dentro da área logada; arquivos estáticos on-brand /entregas-marca/<slug>/) ──
// Servida da mesma fonte estática da página de entrega elevada. Fica atrás do
// login como perímetro de UX (arte-final aprovada não é dado sensível — NF/CPF
// sim, essas continuam por signed URL). Assets acessíveis por URL direta se
// alguém souber o caminho; se a marca precisar virar privada de verdade, migra
// pro bucket eloi-entregas + marca.manifest (tarefa maior, ver addendum §7).
async function renderMarca(){
  const el = document.getElementById('tab-marca');
  const slug = CLIENTE.marca_slug;
  if (!slug || !CLIENTE.marca_publicada) {
    el.innerHTML = '<div class="empty"><div class="ic">🎨</div>Seus arquivos de marca ainda não foram publicados.</div>';
    return;
  }
  const base = `/entregas-marca/${encodeURIComponent(slug)}`;
  try {
    const m = await fetch(`${base}/manifest.json`).then(r => { if (!r.ok) throw new Error('404'); return r.json(); });
    const url = (p) => `${base}/${p}`;
    const completa = m.variacoes.find(v => v.id === 'completa') || m.variacoes[0];
    const escuros = m.paleta.filter(c => !c.claro), claros = m.paleta.filter(c => c.claro);
    const heroBg = (escuros[0] || m.paleta[0]).hex;                    // fundo escuro
    const heroCor = (claros[0] || m.paleta[0]).hex;                    // logo claro por cima (visível)
    const heroPath = completa?.arquivos[heroCor]?.svg;
    const zipUrl = url(`${m.slug}-marca-completa.zip`);
    const paletaHtml = m.paleta.map(c => `<button class="paleta-chip" onclick="copiarHex('${esc(c.hex)}')"><span class="sw" style="background:${esc(c.hex)}"></span>${esc(c.nome)} · ${esc(c.hex)}</button>`).join('');
    const variacoesHtml = m.variacoes.map(v => `
      <div class="variacao-h">${esc(v.nome)}</div>
      <div class="swatches">${m.paleta.map(cor => {
        const f = v.arquivos[cor.hex]; if (!f) return '';
        const fundo = cor.claro ? (escuros[0]||m.paleta[0]).hex : (claros[0]||m.paleta[0]).hex;
        const nomeFundo = `${m.slug}-${v.id}-${cor.hex.replace('#','')}-fundo.png`;
        return `<div class="swatch">
          <div class="prev" style="background:${cor.claro ? '#20201d' : '#f3f1ec'}"><img src="${url(f.preview)}" alt="${esc(v.nome)} ${esc(cor.nome)}" loading="lazy"></div>
          <div class="dl"><a href="${url(f.svg)}" download>SVG</a><a href="${url(f.png)}" download>PNG</a></div>
          <button class="dl-bg" onclick="baixarComFundo('${url(f.png)}','${fundo}','${esc(nomeFundo)}')">▦ PNG com fundo</button>
        </div>`;
      }).join('')}</div>`).join('');
    el.innerHTML = `
      <div class="marca-hero card-base" style="background:${heroBg};color:#fff">
        ${heroPath ? `<img src="${url(heroPath)}" alt="${esc(m.marca || '')}">` : ''}
        <div class="nm">${esc(m.marca || '')}</div>
      </div>
      <div class="paleta-row">${paletaHtml}</div>
      <div class="zip-cta"><div><strong>Baixar tudo</strong><div class="meta">Todas as variações e cores, SVG + PNG</div></div><a class="btn" href="${zipUrl}" download>Baixar .zip</a></div>
      ${m.apresentacao ? `<div class="zip-cta"><div><strong>${esc(m.apresentacao.nome||'Apresentação da marca')}</strong><div class="meta">${esc(m.apresentacao.formato||'PDF')}${m.apresentacao.tamanho?' · '+esc(m.apresentacao.tamanho):''}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap">${m.apresentacao.html?`<a class="btn" href="${base}/${esc(m.apresentacao.html)}" target="_blank" rel="noopener">Ver online ↗</a>`:''}<a class="btn ${m.apresentacao.html?'btn-ghost':''}" href="${base}/${esc(m.apresentacao.arquivo)}" download>Baixar PDF</a></div></div>` : ''}
      ${variacoesHtml}
      <div style="text-align:center;margin-top:26px"><a class="btn btn-ghost btn-sm" href="${base}/">Abrir página completa da marca ↗</a></div>`;
  } catch (e) {
    el.innerHTML = '<div class="empty"><div class="ic">🎨</div>Seus arquivos de marca ainda não foram publicados.</div>';
  }
}
function copiarHex(hex){
  navigator.clipboard.writeText(hex).then(() => toast('Cor copiada: ' + hex)).catch(() => toast(hex));
}
// Compõe a logo (PNG transparente) sobre um fundo de cor da paleta e baixa PNG.
// Client-side (canvas); assets same-origin, sem taint.
function baixarComFundo(src, bg, nome){
  const img = new Image(); img.crossOrigin = 'anonymous';
  img.onload = () => {
    const S = 2000, pad = 0.68, c = document.createElement('canvas'); c.width = S; c.height = S;
    const x = c.getContext('2d'); x.fillStyle = bg; x.fillRect(0, 0, S, S);
    const sc = Math.min(S*pad/img.width, S*pad/img.height), w = img.width*sc, h = img.height*sc;
    x.drawImage(img, (S-w)/2, (S-h)/2, w, h);
    c.toBlob(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = nome; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 2000); toast('Baixando com fundo…'); }, 'image/png');
  };
  img.onerror = () => toast('Erro ao gerar imagem.');
  img.src = src;
}

// ── ARQUIVOS (projeto / apresentação / fonte) ──
const CAT_LABEL_PORTAL = { arquivo: 'Arquivo do projeto', apresentacao: 'Apresentação', fonte: 'Fonte' };
async function renderArquivos(){
  const el = document.getElementById('tab-arquivos');
  try {
    const d = await callPortal('entregas.list');
    const entregas = d.entregas || {};
    const linhas = [];
    Object.keys(entregas).forEach(cat => {
      (entregas[cat] || []).forEach(f => linhas.push(`
        <div class="row">
          <div class="grow"><div class="t">${esc(f.nome)}</div><div class="meta">${esc(CAT_LABEL_PORTAL[cat] || cat)}</div></div>
          <button class="btn btn-sm" onclick="baixarEntrega('${esc(f.path)}')">Baixar</button>
        </div>`));
    });
    el.innerHTML = linhas.length ? '<div class="rows">' + linhas.join('') + '</div>' : '<div class="empty"><div class="ic">📁</div>Nenhum arquivo disponível ainda.</div>';
  } catch (e) {
    el.innerHTML = '<div class="empty"><div class="ic">📁</div>Nenhum arquivo disponível ainda.</div>';
  }
}
async function baixarEntrega(path){
  try { const d = await callPortal('entregas.view_url', { path }); if (d.url) window.open(d.url, '_blank', 'noopener'); }
  catch (e) { toast('Erro ao abrir arquivo.'); }
}

// ── NOTAS FISCAIS ──
const NF_STATUS = { em_execucao:'Em execução', concluida:'Concluída' };
function renderNF(){
  const el = document.getElementById('tab-nf');
  if (!SERVICOS.length) { el.innerHTML = '<div class="empty"><div class="ic">🧾</div>Nenhum serviço registrado ainda.</div>'; return; }
  el.innerHTML = '<div class="rows">' + SERVICOS.map(s => `
    <div class="row">
      <div class="grow">
        <div class="t">${esc(s.descricao)}</div>
        <div class="meta">${brl((s.valor_cents||0)/100)} · ${esc(NF_STATUS[s.status_execucao] || s.status_execucao)}${s.data_pagamento ? ' · ' + fmtDate(s.data_pagamento) : ''}</div>
      </div>
      <span class="badge ${s.pago ? 'pago' : 'aberto'}">${s.pago ? 'Pago' : 'Em aberto'}</span>
      ${s.tem_nf ? `<button class="btn btn-sm" onclick="verNF('${s.id}')">Ver nota fiscal</button>` : ''}
    </div>`).join('') + '</div>';
}
async function verNF(servico_id){
  try {
    const d = await callPortal('nf.view_url', { servico_id });
    if (d.url) window.open(d.url, '_blank', 'noopener');
  } catch (e) { toast('Erro ao abrir nota fiscal.'); }
}

// ── ORÇAMENTOS ──
const ORC_STATUS = { rascunho:'Rascunho', enviado:'Enviado', aprovado:'Aprovado', recusado:'Recusado' };
function renderOrc(){
  const el = document.getElementById('tab-orc');
  if (!ORCAMENTOS.length) { el.innerHTML = '<div class="empty"><div class="ic">💰</div>Nenhum orçamento ainda.</div>'; return; }
  el.innerHTML = '<div class="rows">' + ORCAMENTOS.map(o => `
    <div class="row">
      <div class="grow">
        <div class="t">${esc(o.titulo || 'Sem título')}</div>
        <div class="meta">${brl(o.valor_total)} · ${fmtDate(o.created_at)}</div>
      </div>
      <span class="badge ${o.status || 'rascunho'}">${esc(ORC_STATUS[o.status] || o.status || '—')}</span>
      <a class="btn btn-sm btn-ghost" href="/orcamento/?t=${encodeURIComponent(o.share_token)}" target="_blank" rel="noopener">Ver proposta completa</a>
    </div>`).join('') + '</div>';
}

// ── BRIEFING (somente leitura) ──
const TIPO_LABEL = { 'briefing':'Identidade visual', 'briefing-ecommerce':'E-commerce', 'briefing-solarium':'E-commerce (Solarium)', 'briefing-guia-viver-bem':'Guia Viver Bem' };
const BR_STATUS = { pendente:'Pendente', respondido:'Respondido' };
function renderBriefing(){
  const el = document.getElementById('tab-briefing');
  if (!BRIEFINGS.length) { el.innerHTML = '<div class="empty"><div class="ic">📝</div>Nenhum briefing ainda.</div>'; return; }
  el.innerHTML = '<div class="rows">' + BRIEFINGS.map(b => `
    <div class="row">
      <div class="grow">
        <div class="t">${esc(TIPO_LABEL[b.tipo] || b.tipo)}</div>
        <div class="meta">${b.status === 'respondido' && b.responded_at ? 'Respondido em ' + fmtDate(b.responded_at) : 'Enviado em ' + fmtDate(b.created_at)}</div>
      </div>
      <span class="badge ${b.status || 'pendente'}">${esc(BR_STATUS[b.status] || b.status || '—')}</span>
    </div>`).join('') + '</div>';
}

// ── TABS ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── PREVIEW DE ADMIN ──
// /portal/?preview=<cliente_id>, aberto pelo botao "Ver portal" da Gestao.
// O cliente_id na URL nao da acesso a nada sozinho: quem autoriza e o token de
// admin do localStorage, validado no servidor (action admin_preview). Sem token
// valido, cai na tela de login normal do cliente -- que e o que um estranho ve.
async function tentarPreview(){
  const id = new URLSearchParams(location.search).get('preview');
  if (!id) return false;
  const adminToken = localStorage.getItem('eloi_admin_token');
  if (!adminToken) { toast('Entre no admin primeiro para pré-visualizar.'); return false; }
  try {
    const r = await fetch(FN, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'admin_preview', admin_token: adminToken, cliente_id: id }) });
    const d = await r.json().catch(()=>({}));
    if (!r.ok || !d.token) throw new Error(d.error || 'falha no preview');
    sessionStorage.setItem(PT_KEY, d.token);
    document.getElementById('previewNome').textContent = d.cliente_nome || 'este cliente';
    document.getElementById('previewBanner').classList.remove('hidden');
    mostrarConteudo();
    await carregarDados();
    return true;
  } catch (e) {
    toast('Não foi possível pré-visualizar: ' + e.message);
    return false;
  }
}

// ── Login personalizado por cliente (?c=<marca_slug>) ──
// O nome NÃO vem da URL: vem do manifest.json estático da marca. Assim um
// link forjado (?c=banco-x) não consegue estampar um nome arbitrário numa
// página do nosso domínio — slug desconhecido simplesmente cai no genérico.
// Continua exigindo a senha; isto aqui é só identidade visual.
async function personalizarLogin(){
  const c = new URLSearchParams(location.search).get('c');
  if (!c || !/^[a-z0-9-]{1,60}$/.test(c)) return;
  try {
    const m = await fetch(`/entregas-marca/${encodeURIComponent(c)}/manifest.json`, { cache: 'no-store' })
      .then(r => { if (!r.ok) throw new Error('404'); return r.json(); });
    const nome = m.cliente || m.marca;
    if (!nome) return;
    const el = document.getElementById('loginCliente');
    el.textContent = nome;
    el.style.display = '';
    document.getElementById('loginTitulo').textContent = 'Portal do Cliente';
    // toque da marca do cliente no botão/foco, se a paleta existir
    const escura = (m.paleta || []).find(x => !x.claro);
    if (escura) document.documentElement.style.setProperty('--cliente-cor', escura.hex);
  } catch (_) { /* slug inexistente: mantém o genérico */ }
}
personalizarLogin();

tentarPreview().then(ok => {
  if (!ok && token()) { mostrarConteudo(); carregarDados(); }
});
</script>
